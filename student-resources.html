          <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resources - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1a2c3e;
        }

        /* Navigation */
        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6366f1;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #6366f1;
        }

        .nav-links a.active {
            color: #6366f1;
            font-weight: 600;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header Section */
        .header-section {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '📚';
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 80px;
            opacity: 0.1;
        }

        .header-section h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .header-section p {
            opacity: 0.9;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.15);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6366f1;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            padding: 0.6rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            color: #6b7280;
            transition: all 0.3s;
            border-radius: 2rem;
        }

        .tab-btn.active {
            background: #6366f1;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            color: #6366f1;
        }

        /* Assignment Cards */
        .assignment-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .assignment-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .assignment-header {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 1.2rem 1.5rem;
            border-left: 4px solid #6366f1;
        }

        .assignment-subject {
            font-size: 0.7rem;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .assignment-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 0.25rem;
            color: #1e293b;
        }

        .assignment-due {
            font-size: 0.75rem;
            color: #f59e0b;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .assignment-body {
            padding: 1.5rem;
        }

        .assignment-description {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .submission-area {
            background: #f8fafc;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .submission-label {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        .submission-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            transition: all 0.3s;
        }

        .submission-input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn-submit {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            margin-top: 0.75rem;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .submitted-badge {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Note Cards */
        .note-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .note-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .note-header {
            background: linear-gradient(135deg, #fef9e6, #fff5e0);
            padding: 1.2rem 1.5rem;
            border-left: 4px solid #f59e0b;
        }

        .note-subject {
            font-size: 0.7rem;
            color: #f59e0b;
            font-weight: 600;
            text-transform: uppercase;
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.25rem;
            color: #1e293b;
        }

        .note-body {
            padding: 1.5rem;
        }

        .note-content {
            color: #475569;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .note-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }

        .note-link:hover {
            text-decoration: underline;
        }

        .note-date {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid #eef2f6;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .nav-links a {
                margin: 0 0.5rem;
            }
            .container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header-section h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">📚 The Junior Scholar Portal</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html">Live Classes</a>
            <a href="student-resources.html" class="active">Resources</a>
        </div>
    </nav>

    <div class="container">
        <!-- Header Section -->
        <div class="header-section">
            <h1>📋 My Learning Resources</h1>
            <p>View assignments from your teachers and access study materials</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending Assignments</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="submittedCount">0</div>
                <div class="stat-label">Submitted</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="notesCount">0</div>
                <div class="stat-label">Notes Available</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('assignments')">📝 My Assignments</button>
            <button class="tab-btn" onclick="showTab('notes')">📚 Teacher Notes</button>
        </div>

        <!-- Assignments Container -->
        <div id="assignmentsContainer"></div>

        <!-- Notes Container -->
        <div id="notesContainer" style="display: none;"></div>
    </div>

    <script>
        // Get current student
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const studentData = currentStudent ? students.find(s => s.id === currentStudent.id) : null;

        if (!studentData) {
            window.location.href = 'login.html';
        }

        // Load submissions for this student
        let submissions = JSON.parse(localStorage.getItem('submissions_' + studentData.id) || '{}');

        function showTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'assignments') {
                document.getElementById('assignmentsContainer').style.display = 'block';
                document.getElementById('notesContainer').style.display = 'none';
                loadAssignments();
            } else {
                document.getElementById('assignmentsContainer').style.display = 'none';
                document.getElementById('notesContainer').style.display = 'block';
                loadNotes();
            }
        }

        function loadAssignments() {
            const assignments = JSON.parse(localStorage.getItem('teacherAssignments') || '[]');
            const container = document.getElementById('assignmentsContainer');
            
            if (assignments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No Assignments Yet</h3>
                        <p>Your teachers haven't posted any assignments yet. Check back later!</p>
                    </div>
                `;
                document.getElementById('pendingCount').textContent = '0';
                document.getElementById('submittedCount').textContent = Object.keys(submissions).length;
                return;
            }

            let pending = 0;
            assignments.forEach(a => {
                if (!submissions[a.id]) pending++;
            });
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('submittedCount').textContent = Object.keys(submissions).length;

            container.innerHTML = assignments.map(assignment => {
                const submitted = submissions[assignment.id];
                const dueDate = new Date(assignment.dueDate);
                const today = new Date();
                const isOverdue = dueDate < today && !submitted;
                
                return `
                    <div class="assignment-card">
                        <div class="assignment-header">
                            <div class="assignment-subject">${assignment.subject}</div>
                            <div class="assignment-title">${assignment.title}</div>
                            <div class="assignment-due">
                                <span>📅 Due: ${assignment.dueDate}</span>
                                ${isOverdue ? '<span style="color: #dc2626;"> ⚠️ OVERDUE</span>' : ''}
                            </div>
                        </div>
                        <div class="assignment-body">
                            <div class="assignment-description">${assignment.description.replace(/\n/g, '<br>')}</div>
                            <div class="submission-area">
                                <div class="submission-label">${submitted ? '✅ Your Submission' : '📝 Submit Your Answer'}</div>
                                ${submitted ? `
                                    <div class="submitted-badge">
                                        <span>✅</span>
                                        <span>Submitted on ${submitted.date}</span>
                                    </div>
                                    <div style="margin-top: 0.5rem; padding: 0.75rem; background: white; border-radius: 0.5rem;">
                                        <strong>Your answer:</strong><br>
                                        "${submitted.answer}"
                                    </div>
                                ` : `
                                    <textarea id="answer_${assignment.id}" class="submission-input" rows="4" placeholder="Write your answer here..."></textarea>
                                    <button class="btn-submit" onclick="submitAssignment(${assignment.id}, '${assignment.title.replace(/'/g, "\\'")}')">
                                        📤 Submit Assignment
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('teacherNotes') || '[]');
            const container = document.getElementById('notesContainer');
            
            document.getElementById('notesCount').textContent = notes.length;
            
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>No Notes Available</h3>
                        <p>Your teachers haven't shared any notes yet. Check back later!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notes.map(note => `
                <div class="note-card">
                    <div class="note-header">
                        <div class="note-subject">${note.subject}</div>
                        <div class="note-title">${note.title}</div>
                    </div>
                    <div class="note-body">
                        <div class="note-content">${note.content.replace(/\n/g, '<br>')}</div>
                        ${note.link ? `
                            <a href="${note.link}" target="_blank" class="note-link">
                                🔗 Open Resource →
                            </a>
                        ` : ''}
                        <div class="note-date">
                            📅 Shared on ${new Date(note.createdAt).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function submitAssignment(assignmentId, title) {
            const answer = document.getElementById(`answer_${assignmentId}`).value;
            
            if (!answer.trim()) {
                alert('Please write your answer before submitting.');
                return;
            }
            
            if (answer.length < 10) {
                alert('Please provide a more detailed answer (at least 10 characters).');
                return;
            }
            
            // Save submission
            submissions[assignmentId] = {
                assignmentId: assignmentId,
                title: title,
                answer: answer,
                date: new Date().toLocaleString(),
                studentId: studentData.id,
                studentName: studentData.fullName
            };
            
            localStorage.setItem('submissions_' + studentData.id, JSON.stringify(submissions));
            
            // Save to all submissions for teacher
            let allSubmissions = JSON.parse(localStorage.getItem('allSubmissions') || '[]');
            allSubmissions.push({
                assignmentId: assignmentId,
                title: title,
                answer: answer,
                date: new Date().toLocaleString(),
                studentId: studentData.id,
                studentName: studentData.fullName,
                studentEmail: studentData.email
            });
            localStorage.setItem('allSubmissions', JSON.stringify(allSubmissions));
            
            // Also update student's practice stats (add points for completing assignment)
            let studentsList = JSON.parse(localStorage.getItem('students') || '[]');
            const studentIndex = studentsList.findIndex(s => s.id === studentData.id);
            if (studentIndex !== -1) {
                studentsList[studentIndex].practiceStats = studentsList[studentIndex].practiceStats || { total: 0, correct: 0, points: 0 };
                studentsList[studentIndex].practiceStats.points = (studentsList[studentIndex].practiceStats.points || 0) + 20;
                localStorage.setItem('students', JSON.stringify(studentsList));
            }
            
            alert(`✅ Assignment "${title}" submitted successfully! +20 points earned!`);
            
            // Reload assignments to show submitted status
            loadAssignments();
        }

        // Initial load
        loadAssignments();
    </script>
</body>
</html>
