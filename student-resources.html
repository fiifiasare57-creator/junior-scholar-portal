<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resources - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Red Glass Header */
        .glass-header {
            background: rgba(239, 68, 68, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .glass-header p {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Stats Cards - Red Glass */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(239, 68, 68, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            padding: 0.6rem 1.5rem;
            background: none;
            border: 2px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-weight: 500;
            color: white;
            border-radius: 2rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        /* Assignment Cards - Red Glass */
        .assignment-card, .note-card {
            background: rgba(239, 68, 68, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .assignment-card:hover, .note-card:hover {
            transform: translateY(-5px);
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .assignment-header, .note-header {
            padding: 1rem 1.5rem;
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .assignment-subject, .note-subject {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .assignment-title, .note-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            margin-top: 0.25rem;
        }

        .assignment-due {
            font-size: 0.7rem;
            color: #fcd34d;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .assignment-body, .note-body {
            padding: 1.5rem;
        }

        .assignment-description, .note-content {
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .submission-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .submission-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.5rem;
        }

        .submission-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.95);
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s;
        }

        .submission-input:focus {
            outline: none;
            border-color: white;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .btn-submit {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 0.5rem;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-submit:hover {
            background: white;
            color: #ef4444;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .submitted-badge {
            background: rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(239, 68, 68, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Credits */
        .credits {
            text-align: center;
            padding: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 The Junior Scholar Portal</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html">Live Classes</a>
            <a href="student-resources.html" class="active">Resources</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-header">
            <h1>📋 My Learning Resources</h1>
            <p>View assignments from your teachers and access study materials</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending Assignments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="submittedCount">0</div>
                <div class="stat-label">Submitted</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="notesCount">0</div>
                <div class="stat-label">Notes Available</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('assignments')">📝 Assignments</button>
            <button class="tab-btn" onclick="showTab('notes')">📚 Teacher Notes</button>
        </div>

        <div id="assignmentsContainer"></div>
        <div id="notesContainer" style="display: none;"></div>

        <div class="credits">
            ✨ Made with Excellence by SKILABS ✨<br>
            Caleb Fiifi Asare & Arnold Kadi
        </div>
    </div>

    <script>
        // Get current student
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const studentData = currentStudent ? students.find(s => s.id === currentStudent.id) : null;

        if (!studentData) {
            window.location.href = 'login.html';
        }

        let submissions = JSON.parse(localStorage.getItem('submissions_' + studentData.id) || '{}');

        function showTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'assignments') {
                document.getElementById('assignmentsContainer').style.display = 'block';
                document.getElementById('notesContainer').style.display = 'none';
                loadAssignments();
            } else {
                document.getElementById('assignmentsContainer').style.display = 'none';
                document.getElementById('notesContainer').style.display = 'block';
                loadNotes();
            }
        }

        function loadAssignments() {
            const assignments = JSON.parse(localStorage.getItem('teacherAssignments') || '[]');
            const container = document.getElementById('assignmentsContainer');
            
            let pending = 0;
            assignments.forEach(a => { if (!submissions[a.id]) pending++; });
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('submittedCount').textContent = Object.keys(submissions).length;
            
            if (assignments.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No assignments yet. Check back later!</div>';
                return;
            }
            
            container.innerHTML = assignments.map(a => {
                const submitted = submissions[a.id];
                return `
                    <div class="assignment-card">
                        <div class="assignment-header">
                            <div class="assignment-subject">${a.subject}</div>
                            <div class="assignment-title">${a.title}</div>
                            <div class="assignment-due">
                                <span>📅</span>
                                <span>Due: ${a.dueDate}</span>
                            </div>
                        </div>
                        <div class="assignment-body">
                            <div class="assignment-description">${a.description.replace(/\n/g, '<br>')}</div>
                            <div class="submission-area">
                                <div class="submission-label">${submitted ? '✅ Your Submission' : '📝 Submit Your Answer'}</div>
                                ${submitted ? `
                                    <div class="submitted-badge">
                                        <span>✅</span>
                                        <span>Submitted on ${submitted.date}</span>
                                    </div>
                                    <div style="margin-top: 0.5rem; padding: 0.75rem; background: rgba(255,255,255,0.1); border-radius: 0.5rem; color: white;">
                                        <strong>Your answer:</strong><br>
                                        "${submitted.answer}"
                                    </div>
                                ` : `
                                    <textarea id="answer_${a.id}" class="submission-input" rows="4" placeholder="Write your answer here..."></textarea>
                                    <button class="btn-submit" onclick="submitAssignment(${a.id}, '${a.title.replace(/'/g, "\\'")}')">
                                        📤 Submit Assignment
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('teacherNotes') || '[]');
            const container = document.getElementById('notesContainer');
            document.getElementById('notesCount').textContent = notes.length;
            
            if (notes.length === 0) {
                container.innerHTML = '<div class="empty-state">📚 No notes shared yet. Check back later!</div>';
                return;
            }
            
            container.innerHTML = notes.map(n => `
                <div class="note-card">
                    <div class="note-header">
                        <div class="note-subject">${n.subject}</div>
                        <div class="note-title">${n.title}</div>
                    </div>
                    <div class="note-body">
                        <div class="note-content">${n.content.replace(/\n/g, '<br>')}</div>
                        ${n.link ? `<a href="${n.link}" target="_blank" style="color: white; text-decoration: underline; display: inline-block; margin-top: 0.5rem; border: 1px solid white; padding: 0.3rem 0.8rem; border-radius: 2rem;">🔗 Open Resource →</a>` : ''}
                        <div style="font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.2);">
                            📅 Shared on ${new Date(n.createdAt).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function submitAssignment(id, title) {
            const answer = document.getElementById(`answer_${id}`).value;
            if (!answer.trim()) {
                alert('Please write your answer before submitting.');
                return;
            }
            if (answer.length < 10) {
                alert('Please provide a more detailed answer (at least 10 characters).');
                return;
            }
            
            submissions[id] = {
                assignmentId: id,
                title: title,
                answer: answer,
                date: new Date().toLocaleString(),
                studentId: studentData.id,
                studentName: studentData.fullName
            };
            localStorage.setItem('submissions_' + studentData.id, JSON.stringify(submissions));
            
            let allSubmissions = JSON.parse(localStorage.getItem('allSubmissions') || '[]');
            allSubmissions.push({
                assignmentId: id,
                title: title,
                answer: answer,
                date: new Date().toLocaleString(),
                studentId: studentData.id,
                studentName: studentData.fullName,
                studentEmail: studentData.email
            });
            localStorage.setItem('allSubmissions', JSON.stringify(allSubmissions));
            
            let studentsList = JSON.parse(localStorage.getItem('students') || '[]');
            const studentIndex = studentsList.findIndex(s => s.id === studentData.id);
            if (studentIndex !== -1) {
                studentsList[studentIndex].practiceStats = studentsList[studentIndex].practiceStats || { total: 0, correct: 0, points: 0 };
                studentsList[studentIndex].practiceStats.points = (studentsList[studentIndex].practiceStats.points || 0) + 20;
                localStorage.setItem('students', JSON.stringify(studentsList));
            }
            
            alert(`✅ Assignment "${title}" submitted successfully! +20 points earned!`);
            loadAssignments();
        }

        // Initial load
        loadAssignments();
    </script>
</body>
</html>
