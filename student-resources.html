<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resources - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1a2c3e;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6366f1;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            margin-left: 1.5rem;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #6366f1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.7rem 1.5rem;
            background: white;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
        }

        .tab-btn.active {
            background: #6366f1;
            color: white;
        }

        .card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .assignment-title {
            font-weight: 700;
            font-size: 1rem;
            color: #1e293b;
        }

        .assignment-due {
            font-size: 0.7rem;
            color: #f59e0b;
            margin-top: 0.25rem;
        }

        .submission-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            font-family: inherit;
        }

        .btn-submit {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .submitted-badge {
            background: #d1fae5;
            color: #065f46;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .nav-links a {
                margin: 0 0.5rem;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">📚 The Junior Scholar Portal</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html">Live Classes</a>
            <a href="student-resources.html" style="color:#6366f1; font-weight:600;">Resources</a>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('assignments')">📝 My Assignments</button>
            <button class="tab-btn" onclick="showTab('notes')">📚 Teacher Notes</button>
        </div>

        <div id="assignmentsTab"></div>
        <div id="notesTab" style="display:none;"></div>
    </div>

    <script>
        // Get current student
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
        
        if (!currentStudent) {
            window.location.href = 'login.html';
        }

        let submissions = JSON.parse(localStorage.getItem('submissions_' + currentStudent.id) || '{}');

        function showTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'assignments') {
                document.getElementById('assignmentsTab').style.display = 'block';
                document.getElementById('notesTab').style.display = 'none';
                loadAssignments();
            } else {
                document.getElementById('assignmentsTab').style.display = 'none';
                document.getElementById('notesTab').style.display = 'block';
                loadNotes();
            }
        }

        function loadAssignments() {
            const assignments = JSON.parse(localStorage.getItem('teacherAssignments') || '[]');
            const container = document.getElementById('assignmentsTab');
            
            if (assignments.length === 0) {
                container.innerHTML = '<div class="card"><div class="empty-state">📭 No assignments yet. Check back later!</div></div>';
                return;
            }
            
            container.innerHTML = assignments.map(a => {
                const submitted = submissions[a.id];
                return `
                    <div class="card">
                        <div class="assignment-title">📌 ${a.subject}: ${a.title}</div>
                        <div class="assignment-due">📅 Due: ${a.dueDate}</div>
                        <p style="margin-top:0.75rem; color:#475569;">${a.description}</p>
                        ${submitted ? `
                            <div class="submitted-badge">
                                ✅ Submitted on ${submitted.date}
                                <br><small>Your answer: "${submitted.answer.substring(0, 100)}..."</small>
                            </div>
                        ` : `
                            <textarea id="answer_${a.id}" class="submission-input" rows="3" placeholder="Write your answer here..."></textarea>
                            <button class="btn-submit" onclick="submitAssignment(${a.id}, '${a.title}')">📤 Submit Assignment</button>
                        `}
                    </div>
                `;
            }).join('');
        }

        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('teacherNotes') || '[]');
            const container = document.getElementById('notesTab');
            
            if (notes.length === 0) {
                container.innerHTML = '<div class="card"><div class="empty-state">📚 No notes shared yet. Check back later!</div></div>';
                return;
            }
            
            container.innerHTML = notes.map(n => `
                <div class="card">
                    <div class="assignment-title">📘 ${n.subject}: ${n.title}</div>
                    <p style="margin-top:0.75rem; white-space:pre-wrap; color:#334155;">${n.content}</p>
                    ${n.link ? `<a href="${n.link}" target="_blank" style="color:#6366f1; display:inline-block; margin-top:0.5rem;">🔗 Open Resource →</a>` : ''}
                    <div style="font-size:0.7rem; color:#94a3b8; margin-top:0.75rem;">📅 Shared: ${new Date(n.createdAt).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        function submitAssignment(id, title) {
            const answer = document.getElementById(`answer_${id}`).value;
            if (!answer.trim()) {
                alert('Please write your answer before submitting.');
                return;
            }
            
            if (answer.length < 10) {
                alert('Please provide a more detailed answer (at least 10 characters).');
                return;
            }
            
            submissions[id] = {
                assignmentId: id,
                title: title,
                answer: answer,
                date: new Date().toLocaleString(),
                studentId: currentStudent.id
            };
            
            localStorage.setItem('submissions_' + currentStudent.id, JSON.stringify(submissions));
            
            // Also save to all submissions for teacher
            let allSubmissions = JSON.parse(localStorage.getItem('allSubmissions') || '[]');
            allSubmissions.push({
                assignmentId: id,
                title: title,
                answer: answer,
                date: new Date().toLocaleString(),
                studentId: currentStudent.id,
                studentName: currentStudent.name
            });
            localStorage.setItem('allSubmissions', JSON.stringify(allSubmissions));
            
            alert(`✅ Assignment "${title}" submitted successfully!`);
            loadAssignments();
        }

        // Initial load
        loadAssignments();
    </script>
</body>
</html>
