<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Create Tests</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #1e293b; margin-bottom: 0.5rem; }
        .subtitle { color: #6b7280; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-family: inherit;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .test-item {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .delete-btn {
            background: #ef4444;
            padding: 0.3rem 0.8rem;
            width: auto;
            margin-top: 0.5rem;
        }
        .success-msg {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>👨‍🏫 Teacher Portal</h1>
            <p class="subtitle">Create tests - Students will see them instantly!</p>
            
            <div id="successMsg" class="success-msg"></div>
            
            <form id="testForm">
                <div class="form-group">
                    <label>Subject</label>
                    <select id="subject" required>
                        <option>Mathematics</option>
                        <option>English</option>
                        <option>Science</option>
                        <option>Social Studies</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Test Title</label>
                    <input type="text" id="title" required placeholder="e.g., Algebra Quiz, Essay Test">
                </div>
                <div class="form-group">
                    <label>Questions / Instructions</label>
                    <textarea id="description" rows="5" required placeholder="Write the test questions here..."></textarea>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="dueDate" required>
                </div>
                <button type="submit">📤 PUBLISH TEST TO STUDENTS</button>
            </form>
        </div>

        <div class="card">
            <h2>📋 Your Published Tests</h2>
            <div id="testsList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdX12Kbhb8L1R",
            authDomain: "junior-scholar-portal.firebaseapp.com",
            projectId: "junior-scholar-portal",
            storageBucket: "junior-scholar-portal.firebasestorage.app",
            messagingSenderId: "519496965849",
            appId: "1:519496965849:web:86",
            databaseURL: "https://junior-scholar-portal-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Load existing tests
        function loadTests() {
            database.ref('assignments').on('value', (snapshot) => {
                const tests = [];
                snapshot.forEach(child => {
                    tests.push({ id: child.key, ...child.val() });
                });
                tests.reverse();
                
                const container = document.getElementById('testsList');
                if (tests.length === 0) {
                    container.innerHTML = '<p style="color: #6b7280;">No tests yet. Create one above!</p>';
                    return;
                }
                
                container.innerHTML = tests.map(test => `
                    <div class="test-item">
                        <strong>📚 ${test.subject}</strong><br>
                        <strong>${test.title}</strong><br>
                        <span style="font-size:0.8rem;">📅 Due: ${test.dueDate}</span><br>
                        <span style="font-size:0.8rem;">${test.description.substring(0,100)}...</span><br>
                        <button class="delete-btn" onclick="deleteTest('${test.id}')">Delete Test</button>
                    </div>
                `).join('');
            });
        }

        window.deleteTest = async (id) => {
            if (confirm('Delete this test? Students will no longer see it.')) {
                await database.ref(`assignments/${id}`).remove();
                alert('Test deleted!');
            }
        };

        // Create new test
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const testData = {
                subject: document.getElementById('subject').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                dueDate: document.getElementById('dueDate').value,
                createdAt: new Date().toISOString()
            };
            
            await database.ref('assignments').push(testData);
            
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = `✅ Test "${testData.title}" published! Students can now see it.`;
            successDiv.style.display = 'block';
            
            document.getElementById('testForm').reset();
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        });

        loadTests();
    </script>
</body>
</html>
