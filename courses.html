<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Courses - The Junior Scholar Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e2e8f0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #3b82f6;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #64748b;
        }

        /* Search and Filter */
        .search-section {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
        }

        /* Course Cards */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .course-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .course-header {
            padding: 1.5rem;
            position: relative;
        }

        .course-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .course-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .course-description {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 0.5rem;
            overflow: hidden;
            height: 0.5rem;
            margin: 1rem 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            height: 100%;
            border-radius: 0.5rem;
            transition: width 0.5s;
        }

        .course-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .course-footer {
            padding: 1rem 1.5rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-continue {
            background: #3b82f6;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn-continue:hover {
            background: #2563eb;
        }

        .btn-locked {
            background: #e2e8f0;
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: not-allowed;
        }

        /* Featured Course */
        .featured-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            color: white;
        }

        .featured-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .featured-info h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .featured-info p {
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .btn-featured {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
        }

        /* Subject Colors */
        .math { border-top: 4px solid #3b82f6; }
        .english { border-top: 4px solid #10b981; }
        .science { border-top: 4px solid #f59e0b; }
        .social { border-top: 4px solid #ef4444; }
        .french { border-top: 4px solid #a855f7; }
        .ict { border-top: 4px solid #06b6d4; }
        .rme { border-top: 4px solid #ec489a; }
        .ghanaian { border-top: 4px solid #84cc16; }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 1rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            
            .nav-links.active {
                display: flex;
            }
            
            .container {
                padding: 1rem;
            }
            
            .courses-grid {
                grid-template-columns: 1fr;
            }
            
            .featured-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">The Junior Scholar Portal</span>
            </a>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="courses.html" class="active">Courses</a>
                <a href="live-class.html">Live Classes</a>
                <a href="practice.html">Practice</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 BECE Courses</h1>
            <p>Master all subjects with our comprehensive curriculum</p>
        </div>

        <!-- Featured Course -->
        <div class="featured-section">
            <div class="featured-content">
                <div class="featured-info">
                    <h2>⭐ Featured: Mathematics Crash Course</h2>
                    <p>Complete coverage of all BECE Mathematics topics with practice questions and video lessons</p>
                    <a href="#" class="btn-featured" onclick="startCourse('Mathematics Crash Course')">Enroll Now →</a>
                </div>
                <div style="font-size: 4rem;">📐</div>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search courses...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Subjects</button>
                <button class="filter-btn" data-filter="core">Core Subjects</button>
                <button class="filter-btn" data-filter="elective">Electives</button>
                <button class="filter-btn" data-filter="in-progress">In Progress</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <!-- Courses Grid -->
        <div class="courses-grid" id="coursesGrid">
            <!-- Course cards will be populated by JavaScript -->
        </div>
    </div>

    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Course Data
        const courses = [
            {
                id: 1,
                title: "Mathematics",
                description: "Numbers, Algebra, Geometry, Statistics, and Mensuration for BECE",
                icon: "📐",
                color: "math",
                category: "core",
                totalLessons: 24,
                completedLessons: 18,
                progress: 75,
                isLocked: false
            },
            {
                id: 2,
                title: "English Language",
                description: "Grammar, Comprehension, Essay Writing, and Literature",
                icon: "📖",
                color: "english",
                category: "core",
                totalLessons: 20,
                completedLessons: 15,
                progress: 75,
                isLocked: false
            },
            {
                id: 3,
                title: "Integrated Science",
                description: "Biology, Chemistry, Physics, and Health Science",
                icon: "🔬",
                color: "science",
                category: "core",
                totalLessons: 22,
                completedLessons: 12,
                progress: 55,
                isLocked: false
            },
            {
                id: 4,
                title: "Social Studies",
                description: "Government, History, Geography, and Civic Education",
                icon: "🌍",
                color: "social",
                category: "core",
                totalLessons: 18,
                completedLessons: 8,
                progress: 44,
                isLocked: false
            },
            {
                id: 5,
                title: "French",
                description: "Basic French vocabulary, grammar, and conversation",
                icon: "🇫🇷",
                color: "french",
                category: "elective",
                totalLessons: 15,
                completedLessons: 0,
                progress: 0,
                isLocked: false
            },
            {
                id: 6,
                title: "ICT / Computing",
                description: "Computer fundamentals, software, and internet basics",
                icon: "💻",
                color: "ict",
                category: "elective",
                totalLessons: 16,
                completedLessons: 0,
                progress: 0,
                isLocked: false
            },
            {
                id: 7,
                title: "Religious & Moral Education",
                description: "Religious studies, moral values, and ethics",
                icon: "🕊️",
                color: "rme",
                category: "core",
                totalLessons: 14,
                completedLessons: 5,
                progress: 36,
                isLocked: false
            },
            {
                id: 8,
                title: "Ghanaian Language (Twi)",
                description: "Reading, writing, and speaking in Twi",
                icon: "🗣️",
                color: "ghanaian",
                category: "elective",
                totalLessons: 12,
                completedLessons: 0,
                progress: 0,
                isLocked: false
            },
            {
                id: 9,
                title: "BECE Past Questions",
                description: "Practice with actual past questions from 2015-2024",
                icon: "📝",
                color: "math",
                category: "core",
                totalLessons: 10,
                completedLessons: 3,
                progress: 30,
                isLocked: false
            },
            {
                id: 10,
                title: "Study Skills & Exam Tips",
                description: "Learn how to prepare effectively for exams",
                icon: "🎯",
                color: "english",
                category: "elective",
                totalLessons: 8,
                completedLessons: 2,
                progress: 25,
                isLocked: false
            }
        ];

        // Load saved progress from localStorage
        function loadProgress() {
            const savedProgress = localStorage.getItem('courseProgress');
            if (savedProgress) {
                const progressData = JSON.parse(savedProgress);
                courses.forEach(course => {
                    if (progressData[course.id]) {
                        course.completedLessons = progressData[course.id].completed;
                        course.progress = Math.round((course.completedLessons / course.totalLessons) * 100);
                    }
                });
            }
        }

        // Save progress to localStorage
        function saveProgress(courseId, completed) {
            let progressData = JSON.parse(localStorage.getItem('courseProgress') || '{}');
            progressData[courseId] = { completed: completed };
            localStorage.setItem('courseProgress', JSON.stringify(progressData));
            
            // Update overall scholar progress
            updateOverallProgress();
        }

        // Update overall progress for dashboard
        function updateOverallProgress() {
            let totalCompleted = 0;
            let totalLessons = 0;
            courses.forEach(course => {
                totalCompleted += course.completedLessons;
                totalLessons += course.totalLessons;
            });
            const overallPercent = Math.round((totalCompleted / totalLessons) * 100);
            const avgAccuracy = 85; // Placeholder
            
            const scholarProgress = {
                syllabus: `${overallPercent}%`,
                courses: courses.filter(c => c.progress === 100).length,
                questions: Math.floor(totalCompleted * 12.5), // Approximate questions answered
                accuracy: `${avgAccuracy}%`,
                overall: `${overallPercent}%`,
                streak: localStorage.getItem('streak') || '7'
            };
            
            localStorage.setItem('scholarProgress', JSON.stringify(scholarProgress));
        }

        // Render courses
        function renderCourses(filter = 'all', search = '') {
            const grid = document.getElementById('coursesGrid');
            let filteredCourses = [...courses];
            
            // Apply category filter
            if (filter !== 'all') {
                if (filter === 'in-progress') {
                    filteredCourses = filteredCourses.filter(c => c.progress > 0 && c.progress < 100);
                } else if (filter === 'completed') {
                    filteredCourses = filteredCourses.filter(c => c.progress === 100);
                } else {
                    filteredCourses = filteredCourses.filter(c => c.category === filter);
                }
            }
            
            // Apply search filter
            if (search) {
                filteredCourses = filteredCourses.filter(c => 
                    c.title.toLowerCase().includes(search.toLowerCase()) ||
                    c.description.toLowerCase().includes(search.toLowerCase())
                );
            }
            
            if (filteredCourses.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: #64748b;">No courses found. Try a different filter!</div>';
                return;
            }
            
            grid.innerHTML = filteredCourses.map(course => `
                <div class="course-card ${course.color}" onclick="viewCourse(${course.id})">
                    <div class="course-header">
                        <div class="course-icon">${course.icon}</div>
                        <h3 class="course-title">${course.title}</h3>
                        <p class="course-description">${course.description}</p>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${course.progress}%"></div>
                        </div>
                        <div class="course-stats">
                            <span>📚 ${course.completedLessons}/${course.totalLessons} lessons</span>
                            <span>⭐ ${course.progress}% complete</span>
                        </div>
                    </div>
                    <div class="course-footer">
                        ${course.progress === 100 ? 
                            '<span style="color: #10b981;">✅ Completed!</span>' : 
                            '<span style="color: #64748b;">📖 In progress</span>'
                        }
                        <a href="#" class="${course.progress === 100 ? 'btn-locked' : 'btn-continue'}" 
                           onclick="event.stopPropagation(); continueCourse(${course.id})">
                            ${course.progress === 100 ? 'Review Course' : 'Continue →'}
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // View course details
        window.viewCourse = function(courseId) {
            const course = courses.find(c => c.id === courseId);
            alert(`📚 ${course.title}\n\n${course.description}\n\nProgress: ${course.progress}%\nLessons completed: ${course.completedLessons}/${course.totalLessons}\n\nClick "Continue" to start learning!`);
        };

        // Continue course
        window.continueCourse = function(courseId) {
            const course = courses.find(c => c.id === courseId);
            
            if (course.progress === 100) {
                alert(`🎉 Congratulations on completing ${course.title}!\n\nReview the material to stay sharp for your BECE.`);
                return;
            }
            
            // Simulate completing a lesson
            if (course.completedLessons < course.totalLessons) {
                const newCompleted = course.completedLessons + 1;
                course.completedLessons = newCompleted;
                course.progress = Math.round((newCompleted / course.totalLessons) * 100);
                
                saveProgress(course.id, newCompleted);
                renderCourses(document.querySelector('.filter-btn.active').dataset.filter, 
                            document.getElementById('searchInput').value);
                
                if (course.progress === 100) {
                    alert(`🎉 Amazing! You've completed ${course.title}!\n\n+50 points added to your profile!`);
                    
                    // Add points
                    let scholarProgress = JSON.parse(localStorage.getItem('scholarProgress') || '{}');
                    let currentQuestions = parseInt(scholarProgress.questions || '247');
                    scholarProgress.questions = currentQuestions + 50;
                    localStorage.setItem('scholarProgress', JSON.stringify(scholarProgress));
                } else {
                    alert(`✅ Great job! You completed a lesson in ${course.title}!\n\nKeep going! ${course.progress}% complete.`);
                }
            }
        };

        // Start featured course
        window.startCourse = function(courseName) {
            alert(`🎓 You've enrolled in ${courseName}!\n\nCheck your dashboard to continue learning.`);
        };

        // Filter buttons
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                const search = document.getElementById('searchInput').value;
                renderCourses(filter, search);
            });
        });

        // Search input
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', () => {
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            renderCourses(activeFilter, searchInput.value);
        });

        // Load saved progress and render
        loadProgress();
        renderCourses('all', '');
        
        // Update overall progress on load
        updateOverallProgress();
    </script>
</body>
</html>
