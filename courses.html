 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Glassmorphism Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
        }

        .glass-header p {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Search Section */
        .search-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }

        .search-input:focus {
            outline: none;
            background: white;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Courses Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Glassmorphism Course Card */
        .course-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .course-header {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
        }

        .course-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .course-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.25rem;
        }

        .course-category {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .course-body {
            padding: 1.5rem;
        }

        .course-description {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .course-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .course-footer {
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-view {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: white;
            color: #667eea;
        }

        .resources-badge {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1.5rem;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .resource-item:hover {
            background: #eef2ff;
            transform: translateX(5px);
        }

        .resource-icon {
            font-size: 1.2rem;
        }

        .resource-info {
            flex: 1;
        }

        .resource-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .resource-desc {
            font-size: 0.7rem;
            color: #6b7280;
        }

        .close-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .container {
                padding: 1rem;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .search-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 The Junior Scholar Portal</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html" class="active">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html">Live Classes</a>
            <a href="student-resources.html">Resources</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-header">
            <h1>📚 BECE Courses</h1>
            <p>Master all subjects with our comprehensive curriculum and learning resources</p>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search courses...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="core">Core Subjects</button>
                <button class="filter-btn" data-filter="elective">Electives</button>
            </div>
        </div>

        <div class="courses-grid" id="coursesGrid"></div>
    </div>

    <div id="resourceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Course Resources</h3>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const courses = [
            { id: 1, title: "Mathematics", description: "Numbers, Algebra, Geometry, Statistics, and Mensuration", icon: "📐", category: "core", resources: ["Algebra Notes", "Geometry Formulas", "Past Questions", "Practice Worksheet"] },
            { id: 2, title: "English Language", description: "Grammar, Comprehension, Essay Writing, and Literature", icon: "📖", category: "core", resources: ["Grammar Guide", "Essay Tips", "Vocabulary List", "Comprehension Passages"] },
            { id: 3, title: "Integrated Science", description: "Biology, Chemistry, Physics, and Health Science", icon: "🔬", category: "core", resources: ["Biology Notes", "Chemistry Basics", "Physics Formulas", "Practical Guide"] },
            { id: 4, title: "Social Studies", description: "Government, History, Geography, and Civic Education", icon: "🌍", category: "core", resources: ["History Timeline", "Government Structure", "Map Reading", "Past Questions"] },
            { id: 5, title: "ICT / Computing", description: "Computer fundamentals, software, and internet basics", icon: "💻", category: "elective", resources: ["Computer Basics", "Internet Safety", "Programming Intro", "MS Office Guide"] },
            { id: 6, title: "French", description: "Basic French vocabulary, grammar, and conversation", icon: "🇫🇷", category: "elective", resources: ["Vocabulary List", "Grammar Guide", "Common Phrases", "Audio Lessons"] },
            { id: 7, title: "Religious & Moral Education", description: "Religious studies, moral values, and ethics", icon: "🕊️", category: "core", resources: ["Religious Studies", "Moral Values", "Ethics Guide"] },
            { id: 8, title: "Ghanaian Language", description: "Reading, writing, and speaking in local language", icon: "🗣️", category: "elective", resources: ["Alphabet Guide", "Common Phrases", "Reading Passages"] }
        ];

        function renderCourses(filter = 'all', search = '') {
            const grid = document.getElementById('coursesGrid');
            let filtered = [...courses];
            
            if (filter !== 'all') {
                filtered = filtered.filter(c => c.category === filter);
            }
            if (search) {
                filtered = filtered.filter(c => c.title.toLowerCase().includes(search.toLowerCase()));
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:2rem; color:white;">No courses found.</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(course => `
                <div class="course-card" onclick="showResources(${course.id})">
                    <div class="course-header">
                        <div class="course-icon">${course.icon}</div>
                        <div class="course-title">${course.title}</div>
                        <div class="course-category">${course.category === 'core' ? 'Core Subject' : 'Elective'}</div>
                    </div>
                    <div class="course-body">
                        <div class="course-description">${course.description}</div>
                        <div class="course-stats">
                            <span>📚 ${course.resources.length} Resources</span>
                            <span>⭐ Interactive</span>
                        </div>
                    </div>
                    <div class="course-footer">
                        <span class="resources-badge">📖 Click to view resources</span>
                        <button class="btn-view" onclick="event.stopPropagation(); showResources(${course.id})">View →</button>
                    </div>
                </div>
            `).join('');
        }

        function showResources(courseId) {
            const course = courses.find(c => c.id === courseId);
            document.getElementById('modalTitle').innerHTML = `${course.icon} ${course.title} Resources`;
            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom: 1rem;">
                    <p style="color: #4b5563;">${course.description}</p>
                </div>
                ${course.resources.map(r => `
                    <div class="resource-item">
                        <div class="resource-icon">📄</div>
                        <div class="resource-info">
                            <div class="resource-title">${r}</div>
                            <div class="resource-desc">Download and study material</div>
                        </div>
                        <span style="color: #667eea;">↓</span>
                    </div>
                `).join('')}
                <button class="close-btn" onclick="closeModal()">Close</button>
            `;
            document.getElementById('resourceModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resourceModal').style.display = 'none';
        }

        // Filter and Search
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCourses(btn.dataset.filter, document.getElementById('searchInput').value);
            });
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            const active = document.querySelector('.filter-btn.active').dataset.filter;
            renderCourses(active, document.getElementById('searchInput').value);
        });

        renderCourses('all', '');
    </script>
</body>
</html>
