<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1a2c3e;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6366f1;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            margin-left: 1.5rem;
            font-weight: 500;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #6366f1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .course-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #eef2f6;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(99,102,241,0.15);
            border-color: #6366f1;
        }

        .course-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .course-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .course-desc {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .resources-badge {
            display: inline-block;
            background: #eef2ff;
            color: #6366f1;
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 1rem;
            border-radius: 1rem 1rem 0 0;
        }

        .modal-body {
            padding: 1rem;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">📚 The Junior Scholar Portal</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html" class="active">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html">Live Classes</a>
            <a href="assignments.html">Assignments</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 BECE Courses</h1>
        </div>

        <div class="courses-grid" id="coursesGrid"></div>
    </div>

    <div id="resourceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Course Resources</h3>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const courses = [
            { id: 1, title: "Mathematics", desc: "Numbers, Algebra, Geometry", icon: "📐", resources: ["Algebra Notes", "Geometry Formulas", "Past Questions"] },
            { id: 2, title: "English Language", desc: "Grammar, Comprehension, Essay", icon: "📖", resources: ["Grammar Guide", "Essay Tips", "Vocabulary List"] },
            { id: 3, title: "Integrated Science", desc: "Biology, Chemistry, Physics", icon: "🔬", resources: ["Biology Notes", "Chemistry Basics", "Physics Formulas"] },
            { id: 4, title: "Social Studies", desc: "Government, History, Geography", icon: "🌍", resources: ["History Timeline", "Government Structure", "Map Reading"] },
            { id: 5, title: "ICT", desc: "Computer fundamentals", icon: "💻", resources: ["Computer Basics", "Internet Safety", "Programming Intro"] }
        ];

        function renderCourses() {
            const grid = document.getElementById('coursesGrid');
            grid.innerHTML = courses.map(course => `
                <div class="course-card" onclick="viewResources(${course.id})">
                    <div class="course-icon">${course.icon}</div>
                    <div class="course-title">${course.title}</div>
                    <div class="course-desc">${course.desc}</div>
                    <span class="resources-badge">📚 ${course.resources.length} Resources</span>
                </div>
            `).join('');
        }

        function viewResources(id) {
            const course = courses.find(c => c.id === id);
            document.getElementById('modalTitle').textContent = `${course.icon} ${course.title} Resources`;
            document.getElementById('modalBody').innerHTML = `
                ${course.resources.map(r => `
                    <div class="resource-item">
                        <span>📄</span>
                        <span>${r}</span>
                        <span style="margin-left: auto; color: #6366f1;">Download →</span>
                    </div>
                `).join('')}
                <button onclick="closeModal()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #6366f1; color: white; border: none; border-radius: 0.5rem; width: 100%; cursor: pointer;">Close</button>
            `;
            document.getElementById('resourceModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resourceModal').style.display = 'none';
        }

        renderCourses();
    </script>
</body>
</html>
