<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Yellow Glass Header */
        .glass-header {
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        .glass-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .glass-header p {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 215, 0, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 215, 0, 0.25);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Search Section */
        .search-section {
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.3);
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.6);
        }

        /* Yellow Glass Courses Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Yellow Glassmorphism Course Card */
        .course-card {
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .course-header {
            padding: 1.5rem;
            background: rgba(255, 215, 0, 0.15);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .course-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .course-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.25rem;
        }

        .course-category {
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .course-body {
            padding: 1.5rem;
        }

        .course-description {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .course-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stats-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .progress-section {
            margin: 1rem 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.3rem;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            height: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #ffd700, #fbbf24);
            height: 100%;
            border-radius: 1rem;
            transition: width 0.3s;
        }

        .course-footer {
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-not-started {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .status-in-progress {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .btn-continue {
            background: linear-gradient(135deg, #ffd700, #fbbf24);
            color: #1e293b;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            max-width: 550px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #ffd700, #fbbf24);
            color: #1e293b;
            padding: 1.5rem;
            border-radius: 1.5rem 1.5rem 0 0;
            position: sticky;
            top: 0;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .lesson-list {
            margin-top: 1rem;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .lesson-item:hover {
            background: #fef9e6;
            transform: translateX(5px);
        }

        .lesson-check {
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .lesson-check.completed {
            background: #ffd700;
            border-color: #ffd700;
            color: #1e293b;
        }

        .lesson-info {
            flex: 1;
        }

        .lesson-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .lesson-desc {
            font-size: 0.7rem;
            color: #6b7280;
        }

        .close-btn {
            background: #ffd700;
            color: #1e293b;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            color: white;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .search-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 The Junior Scholar Portal</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html" class="active">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html">Live Classes</a>
            <a href="student-resources.html">Resources</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-header">
            <h1>📚 BECE Courses</h1>
            <p>Master all subjects with our comprehensive curriculum and learning resources</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCourses">8</div>
                <div class="stat-label">Total Courses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedCourses">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inProgressCourses">0</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalLessons">0</div>
                <div class="stat-label">Lessons Completed</div>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search courses...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="core">Core Subjects</button>
                <button class="filter-btn" data-filter="elective">Electives</button>
                <button class="filter-btn" data-filter="in-progress">In Progress</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <div id="coursesGrid" class="courses-grid"></div>
    </div>

    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Course Details</h3>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Get current student
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const studentData = currentStudent ? students.find(s => s.id === currentStudent.id) : null;
        const storageKey = 'courseProgress_' + (studentData?.id || 'guest');

        // Course Data with lessons
        const courses = [
            { id: 1, title: "Mathematics", description: "Master numbers, algebra, geometry, statistics, and mensuration for BECE success.", icon: "📐", category: "core", lessons: 6, completedLessons: 0 },
            { id: 2, title: "English Language", description: "Improve grammar, comprehension, essay writing, and literature analysis.", icon: "📖", category: "core", lessons: 5, completedLessons: 0 },
            { id: 3, title: "Integrated Science", description: "Explore biology, chemistry, physics, and health science concepts.", icon: "🔬", category: "core", lessons: 5, completedLessons: 0 },
            { id: 4, title: "Social Studies", description: "Learn about government, history, geography, and civic education.", icon: "🌍", category: "core", lessons: 4, completedLessons: 0 },
            { id: 5, title: "ICT / Computing", description: "Learn computer fundamentals, software, and internet basics.", icon: "💻", category: "elective", lessons: 4, completedLessons: 0 },
            { id: 6, title: "French", description: "Learn basic French vocabulary, grammar, and conversation.", icon: "🇫🇷", category: "elective", lessons: 4, completedLessons: 0 },
            { id: 7, title: "Religious & Moral Education", description: "Religious studies, moral values, and ethics.", icon: "🕊️", category: "core", lessons: 4, completedLessons: 0 },
            { id: 8, title: "Ghanaian Language", description: "Reading, writing, and speaking in local language.", icon: "🗣️", category: "elective", lessons: 4, completedLessons: 0 }
        ];

        // Load saved progress
        let courseProgress = JSON.parse(localStorage.getItem(storageKey) || '{}');

        function updateProgress() {
            let completedLessons = 0;
            let totalLessons = 0;
            
            courses.forEach(course => {
                const saved = courseProgress[course.id] || { completed: [] };
                totalLessons += course.lessons;
                completedLessons += saved.completed?.length || 0;
                course.completedLessons = saved.completed?.length || 0;
            });
            
            const completedCourses = courses.filter(c => c.completedLessons === c.lessons).length;
            const inProgress = courses.filter(c => c.completedLessons > 0 && c.completedLessons < c.lessons).length;
            
            document.getElementById('completedCourses').textContent = completedCourses;
            document.getElementById('inProgressCourses').textContent = inProgress;
            document.getElementById('totalLessons').textContent = completedLessons;
            document.getElementById('totalCourses').textContent = courses.length;
        }

        function renderCourses(filter = 'all', search = '') {
            const grid = document.getElementById('coursesGrid');
            let filtered = [...courses];
            
            if (filter !== 'all') {
                if (filter === 'core') {
                    filtered = filtered.filter(c => c.category === 'core');
                } else if (filter === 'elective') {
                    filtered = filtered.filter(c => c.category === 'elective');
                } else if (filter === 'in-progress') {
                    filtered = filtered.filter(c => c.completedLessons > 0 && c.completedLessons < c.lessons);
                } else if (filter === 'completed') {
                    filtered = filtered.filter(c => c.completedLessons === c.lessons);
                }
            }
            
            if (search) {
                filtered = filtered.filter(c => c.title.toLowerCase().includes(search.toLowerCase()));
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">📚 No courses found. Try a different filter!</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(course => {
                const progress = Math.round((course.completedLessons / course.lessons) * 100);
                let status = 'not-started';
                let statusText = 'Not Started';
                if (progress === 100) {
                    status = 'completed';
                    statusText = 'Completed ✓';
                } else if (progress > 0) {
                    status = 'in-progress';
                    statusText = `${progress}% Complete`;
                }
                
                return `
                    <div class="course-card" onclick="openCourse(${course.id})">
                        <div class="course-header">
                            <div class="course-icon">${course.icon}</div>
                            <div class="course-title">${course.title}</div>
                            <div class="course-category">${course.category === 'core' ? 'Core Subject' : 'Elective'}</div>
                        </div>
                        <div class="course-body">
                            <div class="course-description">${course.description}</div>
                            <div class="course-stats">
                                <div class="stats-item">📚 ${course.lessons} Lessons</div>
                                <div class="stats-item">✅ ${course.completedLessons}/${course.lessons} Completed</div>
                            </div>
                            <div class="progress-section">
                                <div class="progress-label">
                                    <span>Progress</span>
                                    <span>${progress}%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="course-footer">
                            <span class="status-badge status-${status}">${statusText}</span>
                            <button class="btn-continue" onclick="event.stopPropagation(); openCourse(${course.id})">${progress > 0 ? 'Continue →' : 'Start Course →'}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openCourse(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return;
            
            const saved = courseProgress[course.id] || { completed: [] };
            const completedLessons = saved.completed || [];
            
            let lessonsHtml = `
                <p style="margin-bottom: 1rem; color: #4b5563;">${course.description}</p>
                <div class="lesson-list">
            `;
            
            for (let i = 1; i <= course.lessons; i++) {
                const isCompleted = completedLessons.includes(i);
                const lessonTitles = {
                    1: "Introduction & Basics",
                    2: "Core Concepts",
                    3: "Practice & Application",
                    4: "Advanced Topics",
                    5: "Review & Assessment",
                    6: "Final Mastery"
                };
                const lessonTitle = lessonTitles[i] || `Lesson ${i}`;
                
                lessonsHtml += `
                    <div class="lesson-item">
                        <div class="lesson-check ${isCompleted ? 'completed' : ''}" onclick="toggleLesson(${course.id}, ${i})">
                            ${isCompleted ? '✓' : ''}
                        </div>
                        <div class="lesson-info">
                            <div class="lesson-title">${lessonTitle}</div>
                            <div class="lesson-desc">Complete this lesson to master ${course.title}</div>
                        </div>
                    </div>
                `;
            }
            
            lessonsHtml += `</div>`;
            
            const progress = Math.round((completedLessons.length / course.lessons) * 100);
            lessonsHtml += `
                <div style="margin-top: 1rem; padding: 1rem; background: #fef9e6; border-radius: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Overall Progress</span>
                        <span style="color: #ffd700; font-weight: 700;">${progress}%</span>
                    </div>
                    <div class="progress-bar" style="background: #e2e8f0;">
                        <div class="progress-fill" style="width: ${progress}%; background: linear-gradient(90deg, #ffd700, #fbbf24);"></div>
                    </div>
                    <div style="margin-top: 0.5rem; font-size: 0.8rem;">
                        ✅ ${completedLessons.length}/${course.lessons} lessons completed
                    </div>
                </div>
                <button class="close-btn" onclick="closeModal()">Close</button>
            `;
            
            document.getElementById('modalTitle').innerHTML = `${course.icon} ${course.title}`;
            document.getElementById('modalBody').innerHTML = lessonsHtml;
            document.getElementById('courseModal').style.display = 'flex';
        }

        function toggleLesson(courseId, lessonIndex) {
            if (!courseProgress[courseId]) {
                courseProgress[courseId] = { completed: [] };
            }
            
            const completed = courseProgress[courseId].completed || [];
            const index = completed.indexOf(lessonIndex);
            
            if (index === -1) {
                completed.push(lessonIndex);
            } else {
                completed.splice(index, 1);
            }
            
            courseProgress[courseId].completed = completed;
            localStorage.setItem(storageKey, JSON.stringify(courseProgress));
            
            // Add points for completing lessons
            if (studentData && index === -1) {
                let studentsList = JSON.parse(localStorage.getItem('students') || '[]');
                const studentIndex = studentsList.findIndex(s => s.id === studentData.id);
                if (studentIndex !== -1) {
                    studentsList[studentIndex].practiceStats = studentsList[studentIndex].practiceStats || { total: 0, correct: 0, points: 0 };
                    studentsList[studentIndex].practiceStats.points = (studentsList[studentIndex].practiceStats.points || 0) + 10;
                    localStorage.setItem('students', JSON.stringify(studentsList));
                }
            }
            
            updateProgress();
            renderCourses(document.querySelector('.filter-btn.active')?.dataset.filter || 'all', document.getElementById('searchInput').value);
            openCourse(courseId);
        }

        function closeModal() {
            document.getElementById('courseModal').style.display = 'none';
        }

        // Filter and Search
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCourses(btn.dataset.filter, document.getElementById('searchInput').value);
            });
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            const active = document.querySelector('.filter-btn.active').dataset.filter;
            renderCourses(active, document.getElementById('searchInput').value);
        });

        window.onclick = function(event) {
            const modal = document.getElementById('courseModal');
            if (event.target === modal) closeModal();
        };

        updateProgress();
        renderCourses('all', '');
    </script>
</body>
</html>
