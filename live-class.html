<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Classes - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1a2c3e;
        }

        /* Navigation */
        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6366f1;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #6366f1;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header Section */
        .header-section {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '🎥';
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 80px;
            opacity: 0.1;
        }

        .header-section h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .header-section p {
            opacity: 0.9;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.15);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6366f1;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }

        /* Section Title */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title span {
            background: #6366f1;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }

        /* Live Now Section */
        .live-now {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 15px rgba(239,68,68,0); }
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            margin-bottom: 1rem;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .live-now h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .live-details {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 1rem 0 1.5rem;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .btn-join {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            color: #dc2626;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Class Cards Grid */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .class-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(99,102,241,0.15);
        }

        .class-header {
            padding: 1.2rem;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-left: 4px solid #6366f1;
        }

        .class-subject {
            font-size: 0.7rem;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .class-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.25rem;
            color: #1e293b;
        }

        .class-teacher {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .class-body {
            padding: 1.2rem;
        }

        .class-description {
            color: #475569;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .class-datetime {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
        }

        .class-date, .class-time {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .class-footer {
            padding: 1rem 1.2rem;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .join-btn {
            background: #6366f1;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .join-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-upcoming {
            background: #eef2ff;
            color: #6366f1;
        }

        .status-live {
            background: #fee2e2;
            color: #dc2626;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Modal for Class Details */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 1.5rem;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #eef2f6;
            display: flex;
            justify-content: flex-end;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .nav-links a {
                margin: 0 0.5rem;
            }
            .container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .classes-grid {
                grid-template-columns: 1fr;
            }
            .header-section h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">📚 The Junior Scholar Portal</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html" class="active">Live Classes</a>
            <a href="student-resources.html">Resources</a>
        </div>
    </nav>

    <div class="container">
        <!-- Header Section -->
        <div class="header-section">
            <h1>🎥 Live Classes</h1>
            <p>Join scheduled classes with your teachers via Google Meet</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalClasses">0</div>
                <div class="stat-label">Total Classes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="upcomingCount">0</div>
                <div class="stat-label">Upcoming Classes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="liveNowCount">0</div>
                <div class="stat-label">Live Now</div>
            </div>
        </div>

        <!-- Live Now Section -->
        <div id="liveNowSection" style="display: none;"></div>

        <!-- Upcoming Classes -->
        <div class="section-title">
            📅 Upcoming Classes
            <span id="upcomingBadge">0</span>
        </div>
        <div id="upcomingClasses" class="classes-grid"></div>
    </div>

    <!-- Class Details Modal -->
    <div id="classModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <h3 id="modalSubject">Subject</h3>
                <p id="modalTitle">Class Details</p>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <a href="#" id="modalJoinBtn" class="join-btn" target="_blank">Join Class →</a>
            </div>
        </div>
    </div>

    <script>
        // Get current student
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const studentData = currentStudent ? students.find(s => s.id === currentStudent.id) : null;

        if (!studentData) {
            window.location.href = 'login.html';
        }

        // Get scheduled classes from Teacher Portal
        let scheduledClasses = JSON.parse(localStorage.getItem('classSchedule') || '[]');

        // Add some default classes if none exist (for demo)
        if (scheduledClasses.length === 0) {
            // Create default classes for demo
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dayAfter = new Date(today);
            dayAfter.setDate(dayAfter.getDate() + 2);
            
            scheduledClasses = [
                {
                    id: Date.now(),
                    subject: "Mathematics",
                    title: "Algebra Masterclass",
                    description: "Learn about linear equations, quadratic equations, and algebraic expressions. This class covers all the key topics you need for BECE Mathematics.",
                    teacher: "Mr. Kofi Mensah",
                    date: today.toISOString().split('T')[0],
                    time: "16:00",
                    duration: "1.5",
                    meetLink: "https://meet.google.com/junior-math-algebra"
                },
                {
                    id: Date.now() + 1,
                    subject: "English Language",
                    title: "Essay Writing Techniques",
                    description: "Master the art of essay writing. Learn how to structure your essays, use proper grammar, and express your ideas clearly.",
                    teacher: "Ms. Adwoa Serwaa",
                    date: tomorrow.toISOString().split('T')[0],
                    time: "15:00",
                    duration: "1.5",
                    meetLink: "https://meet.google.com/junior-english-essay"
                },
                {
                    id: Date.now() + 2,
                    subject: "Integrated Science",
                    title: "Photosynthesis & Plant Nutrition",
                    description: "Understand how plants make their food, the process of photosynthesis, and the importance of plants in our ecosystem.",
                    teacher: "Dr. Mensah",
                    date: dayAfter.toISOString().split('T')[0],
                    time: "14:00",
                    duration: "1.5",
                    meetLink: "https://meet.google.com/junior-science-plant"
                }
            ];
            localStorage.setItem('classSchedule', JSON.stringify(scheduledClasses));
        }

        // Get current date and time
        const now = new Date();
        const todayDate = now.toISOString().split('T')[0];
        const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

        // Separate live and upcoming classes
        let liveClasses = [];
        let upcomingClasses = [];

        scheduledClasses.forEach(cls => {
            const classDateTime = new Date(`${cls.date}T${cls.time}`);
            const isLive = classDateTime <= now && new Date(classDateTime.getTime() + (cls.duration * 60 * 60 * 1000)) > now;
            
            if (isLive) {
                liveClasses.push(cls);
            } else if (new Date(cls.date) >= new Date(todayDate)) {
                upcomingClasses.push(cls);
            }
        });

        // Sort upcoming by date
        upcomingClasses.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

        // Update stats
        document.getElementById('totalClasses').textContent = scheduledClasses.length;
        document.getElementById('upcomingCount').textContent = upcomingClasses.length;
        document.getElementById('liveNowCount').textContent = liveClasses.length;
        document.getElementById('upcomingBadge').textContent = upcomingClasses.length;

        // Render Live Now Section
        function renderLiveNow() {
            const liveSection = document.getElementById('liveNowSection');
            if (liveClasses.length === 0) {
                liveSection.style.display = 'none';
                return;
            }
            
            liveSection.style.display = 'block';
            liveSection.innerHTML = liveClasses.map(cls => `
                <div class="live-now">
                    <div class="live-badge">
                        <span class="pulse-dot"></span>
                        <span>LIVE NOW</span>
                    </div>
                    <h2>${cls.subject}: ${cls.title}</h2>
                    <div class="live-details">
                        <span>👨‍🏫 ${cls.teacher}</span>
                        <span>⏰ Started at ${cls.time}</span>
                        <span>⏱️ ${cls.duration} hours</span>
                    </div>
                    <a href="${cls.meetLink}" class="btn-join" target="_blank" onclick="trackJoin('${cls.subject}')">
                        🎥 Join Class Now →
                    </a>
                </div>
            `).join('');
        }

        // Render Upcoming Classes
        function renderUpcoming() {
            const container = document.getElementById('upcomingClasses');
            
            if (upcomingClasses.length === 0 && liveClasses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <h3>No Classes Scheduled</h3>
                        <p>Your teachers haven't scheduled any classes yet. Check back later!</p>
                    </div>
                `;
                return;
            }
            
            if (upcomingClasses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎉</div>
                        <h3>All Caught Up!</h3>
                        <p>You have no upcoming classes. Enjoy your break!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = upcomingClasses.map(cls => {
                const classDate = new Date(cls.date);
                const formattedDate = classDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                
                return `
                    <div class="class-card" onclick="showClassDetails(${cls.id})">
                        <div class="class-header">
                            <div class="class-subject">${cls.subject}</div>
                            <div class="class-title">${cls.title}</div>
                            <div class="class-teacher">
                                <span>👨‍🏫</span>
                                <span>${cls.teacher}</span>
                            </div>
                        </div>
                        <div class="class-body">
                            <div class="class-description">
                                ${cls.description.substring(0, 100)}${cls.description.length > 100 ? '...' : ''}
                            </div>
                            <div class="class-datetime">
                                <div class="class-date">
                                    <span>📅</span>
                                    <span>${formattedDate}</span>
                                </div>
                                <div class="class-time">
                                    <span>⏰</span>
                                    <span>${cls.time}</span>
                                </div>
                            </div>
                        </div>
                        <div class="class-footer">
                            <span class="status-badge status-upcoming">📅 Upcoming</span>
                            <a href="${cls.meetLink}" class="join-btn" target="_blank" onclick="event.stopPropagation(); trackJoin('${cls.subject}')">
                                View Details →
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Show class details in modal
        function showClassDetails(classId) {
            const cls = scheduledClasses.find(c => c.id === classId);
            if (!cls) return;
            
            const classDate = new Date(cls.date);
            const formattedDate = classDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            document.getElementById('modalSubject').textContent = cls.subject;
            document.getElementById('modalTitle').textContent = cls.title;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>👨‍🏫 Teacher:</strong> ${cls.teacher}</p>
                <p><strong>📅 Date:</strong> ${formattedDate}</p>
                <p><strong>⏰ Time:</strong> ${cls.time}</p>
                <p><strong>⏱️ Duration:</strong> ${cls.duration} hours</p>
                <p><strong>📖 Topic:</strong> ${cls.title}</p>
                <div style="margin-top: 1rem; padding: 1rem; background: #f8fafc; border-radius: 0.5rem;">
                    <strong>📝 Description:</strong><br>
                    ${cls.description}
                </div>
            `;
            document.getElementById('modalJoinBtn').href = cls.meetLink;
            document.getElementById('classModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('classModal').style.display = 'none';
        }

        function trackJoin(subject) {
            // Track that student joined the class
            let joinedClasses = JSON.parse(localStorage.getItem('joinedClasses') || '[]');
            joinedClasses.push({
                subject: subject,
                date: new Date().toISOString()
            });
            localStorage.setItem('joinedClasses', JSON.stringify(joinedClasses));
            
            // Add points for attending
            let studentsList = JSON.parse(localStorage.getItem('students') || '[]');
            const studentIndex = studentsList.findIndex(s => s.id === studentData.id);
            if (studentIndex !== -1) {
                studentsList[studentIndex].practiceStats = studentsList[studentIndex].practiceStats || { total: 0, correct: 0, points: 0 };
                studentsList[studentIndex].practiceStats.points = (studentsList[studentIndex].practiceStats.points || 0) + 15;
                localStorage.setItem('students', JSON.stringify(studentsList));
            }
            
            alert(`🔴 Joining ${subject} class!\n\n+15 points for attendance!`);
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('classModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };

        // Initialize
        renderLiveNow();
        renderUpcoming();
    </script>
</body>
</html>
