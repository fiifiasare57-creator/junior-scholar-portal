<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Classes - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Glass Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
        }

        .glass-header p {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Live Now Section */
        .live-now-section {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3), rgba(220, 38, 38, 0.2));
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        }

        .live-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .live-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        /* Classes Grid */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Glassmorphism Class Card */
        .class-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .class-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .class-header {
            padding: 1.2rem;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(16, 185, 129, 0.3));
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .class-subject {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .class-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            margin-top: 0.25rem;
        }

        .class-teacher {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .class-body {
            padding: 1.2rem;
        }

        .class-description {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .class-datetime {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .class-date, .class-time {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .class-footer {
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-upcoming {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .status-live {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            animation: pulse-text 2s infinite;
        }

        .status-ended {
            background: rgba(100, 116, 139, 0.3);
            color: #94a3b8;
        }

        .btn-join {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-join.disabled, .btn-join:disabled {
            background: rgba(100, 116, 139, 0.5);
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Credits */
        .credits {
            text-align: center;
            padding: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .classes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 The Junior Scholar Portal</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html">Courses</a>
            <a href="practice.html">Practice</a>
            <a href="live-class.html" class="active">Live Classes</a>
            <a href="student-resources.html">Resources</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-header">
            <h1>🎥 Live Classes</h1>
            <p>Join interactive sessions with your teachers via Google Meet</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalClasses">0</div>
                <div class="stat-label">Total Classes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="upcomingCount">0</div>
                <div class="stat-label">Upcoming Classes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="liveNowCount">0</div>
                <div class="stat-label">Live Now</div>
            </div>
        </div>

        <!-- Live Now Section -->
        <div id="liveNowSection" style="display: none;" class="live-now-section"></div>

        <!-- Classes Grid -->
        <div id="classesContainer"></div>

        <div class="credits">
            ✨ Made with Excellence by SKILABS ✨<br>
            Caleb Fiifi Asare & Arnold Kadi
        </div>
    </div>

    <script>
        // Get current student
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const studentData = currentStudent ? students.find(s => s.id === currentStudent.id) : null;

        if (!studentData) {
            // Allow demo mode
            console.log('Guest mode');
        }

        // Get scheduled classes from Teacher Portal
        let scheduledClasses = JSON.parse(localStorage.getItem('classSchedule') || '[]');

        // Add default demo classes if none exist
        if (scheduledClasses.length === 0) {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dayAfter = new Date(today);
            dayAfter.setDate(dayAfter.getDate() + 2);
            
            scheduledClasses = [
                {
                    id: Date.now(),
                    subject: "Mathematics",
                    title: "Algebra Masterclass",
                    description: "Learn about linear equations, quadratic equations, and algebraic expressions. This class covers all the key topics you need for BECE Mathematics.",
                    teacher: "Mr. Kofi Mensah",
                    date: today.toISOString().split('T')[0],
                    time: "16:00",
                    duration: "1.5",
                    meetLink: "https://meet.google.com/junior-math-algebra"
                },
                {
                    id: Date.now() + 1,
                    subject: "English Language",
                    title: "Essay Writing Techniques",
                    description: "Master the art of essay writing. Learn how to structure your essays, use proper grammar, and express your ideas clearly.",
                    teacher: "Ms. Adwoa Serwaa",
                    date: tomorrow.toISOString().split('T')[0],
                    time: "15:00",
                    duration: "1.5",
                    meetLink: "https://meet.google.com/junior-english-essay"
                },
                {
                    id: Date.now() + 2,
                    subject: "Integrated Science",
                    title: "Photosynthesis & Plant Nutrition",
                    description: "Understand how plants make their food, the process of photosynthesis, and the importance of plants in our ecosystem.",
                    teacher: "Dr. Mensah",
                    date: dayAfter.toISOString().split('T')[0],
                    time: "14:00",
                    duration: "1.5",
                    meetLink: "https://meet.google.com/junior-science-plant"
                }
            ];
            localStorage.setItem('classSchedule', JSON.stringify(scheduledClasses));
        }

        // Get current date and time
        const now = new Date();
        const todayDate = now.toISOString().split('T')[0];
        const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

        // Process classes to determine status
        function getClassStatus(cls) {
            const classDateTime = new Date(`${cls.date}T${cls.time}`);
            const classEndTime = new Date(classDateTime.getTime() + (cls.duration * 60 * 60 * 1000));
            
            if (classDateTime <= now && classEndTime > now) {
                return 'live';
            } else if (classDateTime > now) {
                return 'upcoming';
            } else {
                return 'ended';
            }
        }

        // Filter classes
        let liveClasses = [];
        let upcomingClasses = [];
        let endedClasses = [];

        scheduledClasses.forEach(cls => {
            const status = getClassStatus(cls);
            if (status === 'live') {
                liveClasses.push(cls);
            } else if (status === 'upcoming') {
                upcomingClasses.push(cls);
            } else {
                endedClasses.push(cls);
            }
        });

        // Sort upcoming by date
        upcomingClasses.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

        // Update stats
        document.getElementById('totalClasses').textContent = scheduledClasses.length;
        document.getElementById('upcomingCount').textContent = upcomingClasses.length;
        document.getElementById('liveNowCount').textContent = liveClasses.length;

        // Render Live Now Section
        function renderLiveNow() {
            const liveSection = document.getElementById('liveNowSection');
            if (liveClasses.length === 0) {
                liveSection.style.display = 'none';
                return;
            }
            
            liveSection.style.display = 'block';
            liveSection.innerHTML = liveClasses.map(cls => `
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                    <div>
                        <div class="live-header">
                            <span class="pulse-dot"></span>
                            <span class="live-title">LIVE NOW</span>
                        </div>
                        <h2 style="color: white; font-size: 1.3rem; margin-bottom: 0.5rem;">${cls.subject}: ${cls.title}</h2>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap; color: rgba(255,255,255,0.8); font-size: 0.85rem;">
                            <span>👨‍🏫 ${cls.teacher}</span>
                            <span>⏰ Started at ${cls.time}</span>
                            <span>⏱️ ${cls.duration} hours</span>
                        </div>
                    </div>
                    <a href="${cls.meetLink}" class="btn-join" target="_blank" onclick="trackJoin('${cls.subject}')">
                        🎥 Join Class Now →
                    </a>
                </div>
            `).join('');
        }

        // Check if class can be joined (only when live)
        function canJoin(cls) {
            return getClassStatus(cls) === 'live';
        }

        // Render all classes
        function renderClasses() {
            const container = document.getElementById('classesContainer');
            const allClasses = [...liveClasses, ...upcomingClasses, ...endedClasses];
            
            if (allClasses.length === 0) {
                container.innerHTML = '<div class="empty-state">📅 No classes scheduled yet. Check back later!</div>';
                return;
            }
            
            container.innerHTML = allClasses.map(cls => {
                const status = getClassStatus(cls);
                const statusText = status === 'live' ? '🔴 LIVE NOW' : status === 'upcoming' ? '📅 Upcoming' : '✅ Ended';
                const statusClass = status === 'live' ? 'status-live' : status === 'upcoming' ? 'status-upcoming' : 'status-ended';
                const canJoinClass = status === 'live';
                
                const classDate = new Date(cls.date);
                const formattedDate = classDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                
                return `
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-subject">${cls.subject}</div>
                            <div class="class-title">${cls.title}</div>
                            <div class="class-teacher">
                                <span>👨‍🏫</span>
                                <span>${cls.teacher}</span>
                            </div>
                        </div>
                        <div class="class-body">
                            <div class="class-description">${cls.description.substring(0, 120)}${cls.description.length > 120 ? '...' : ''}</div>
                            <div class="class-datetime">
                                <div class="class-date">
                                    <span>📅</span>
                                    <span>${formattedDate}</span>
                                </div>
                                <div class="class-time">
                                    <span>⏰</span>
                                    <span>${cls.time}</span>
                                </div>
                            </div>
                        </div>
                        <div class="class-footer">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            ${canJoinClass ? 
                                `<a href="${cls.meetLink}" class="btn-join" target="_blank" onclick="trackJoin('${cls.subject}')">Join Session →</a>` :
                                `<button class="btn-join disabled" disabled>${status === 'upcoming' ? 'Coming Soon' : 'Session Ended'}</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        function trackJoin(subject) {
            // Track that student joined the class
            let joinedClasses = JSON.parse(localStorage.getItem('joinedClasses') || '[]');
            joinedClasses.push({
                subject: subject,
                date: new Date().toISOString()
            });
            localStorage.setItem('joinedClasses', JSON.stringify(joinedClasses));
            
            // Add points for attending
            if (studentData) {
                let studentsList = JSON.parse(localStorage.getItem('students') || '[]');
                const studentIndex = studentsList.findIndex(s => s.id === studentData.id);
                if (studentIndex !== -1) {
                    studentsList[studentIndex].practiceStats = studentsList[studentIndex].practiceStats || { total: 0, correct: 0, points: 0 };
                    studentsList[studentIndex].practiceStats.points = (studentsList[studentIndex].practiceStats.points || 0) + 15;
                    localStorage.setItem('students', JSON.stringify(studentsList));
                }
            }
            
            alert(`🔴 Joining ${subject} class!\n\n+15 points for attendance!`);
        }

        // Auto-refresh every minute to update class statuses
        function refreshPage() {
            location.reload();
        }
        
        // Refresh every 60 seconds to update "Live Now" status
        setInterval(() => {
            refreshPage();
        }, 60000);

        // Initial render
        renderLiveNow();
        renderClasses();
    </script>
</body>
</html>
