<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Junior Scholar Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3a5f, #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-register:hover {
            background: #27ae60;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }

        .login-link a {
            color: #2ecc71;
            text-decoration: none;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Student Registration</h1>
        <p class="subtitle">Create your account to start learning</p>

        <div id="successMsg" class="success-message"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>👤 Full Name *</label>
                    <input type="text" id="fullName" placeholder="e.g., Kwame Asare" required>
                </div>
                <div class="form-group">
                    <label>🎂 Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>🏫 School *</label>
                    <input type="text" id="school" placeholder="e.g., Presec Legon" required>
                </div>
                <div class="form-group">
                    <label>📚 Class *</label>
                    <select id="class" required>
                        <option value="">Select Class</option>
                        <option value="JHS 1">JHS 1</option>
                        <option value="JHS 2">JHS 2</option>
                        <option value="JHS 3 (BECE Candidate)">JHS 3 (BECE Candidate)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>📧 Email *</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label>📱 Phone *</label>
                <input type="tel" id="phone" placeholder="e.g., 0244123456" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>👨‍👩 Parent/Guardian *</label>
                    <input type="text" id="parentName" placeholder="Parent's full name" required>
                </div>
                <div class="form-group">
                    <label>📞 Parent Phone *</label>
                    <input type="tel" id="parentPhone" placeholder="Parent's phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>🔑 Password *</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>

            <button type="submit" class="btn-register">📝 Register & Start Learning →</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get all values
            const fullName = document.getElementById('fullName').value;
            const dob = document.getElementById('dob').value;
            const school = document.getElementById('school').value;
            const studentClass = document.getElementById('class').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const parentName = document.getElementById('parentName').value;
            const parentPhone = document.getElementById('parentPhone').value;
            const password = document.getElementById('password').value;
            
            // Validate
            if (!fullName || !dob || !school || !studentClass || !email || !phone || !parentName || !parentPhone || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            // Create student object
            const studentData = {
                id: Date.now(),
                fullName: fullName,
                dateOfBirth: dob,
                school: school,
                class: studentClass,
                email: email,
                phone: phone,
                parentName: parentName,
                parentPhone: parentPhone,
                password: password,
                registeredDate: new Date().toISOString(),
                practiceStats: {
                    total: 0,
                    correct: 0,
                    points: 0
                },
                courseProgress: {}
            };
            
            // Get existing students
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            
            // Check if email already exists
            if (students.some(s => s.email === email)) {
                alert('❌ This email is already registered. Please login instead.');
                return;
            }
            
            // Add new student
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));
            
            // Save current session
            localStorage.setItem('currentStudent', JSON.stringify({
                id: studentData.id,
                name: studentData.fullName,
                email: studentData.email
            }));
            
            // Save scholar name for dashboard
            localStorage.setItem('scholarName', studentData.fullName);
            localStorage.setItem('scholarEmail', studentData.email);
            
            // Show success message
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = `✅ Registration successful! Welcome ${fullName}! Redirecting to dashboard...`;
            successMsg.style.display = 'block';
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        });
    </script>
</body>
</html>m
