<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register - The Junior Scholar Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3a5f, #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 1rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .login-link a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .register-container {
                padding: 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Student Registration</h1>
        <p class="subtitle">Create your account to start learning</p>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>👤 Student's Full Name *</label>
                    <input type="text" id="studentName" placeholder="e.g., Kwame Asare" required>
                </div>
                <div class="form-group">
                    <label>🎂 Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>🏫 School/Ward *</label>
                    <input type="text" id="school" placeholder="e.g., Presec Legon" required>
                </div>
                <div class="form-group">
                    <label>📚 Class/Form *</label>
                    <select id="class" required>
                        <option value="">Select Class</option>
                        <option value="JHS 1">JHS 1</option>
                        <option value="JHS 2">JHS 2</option>
                        <option value="JHS 3 (BECE Candidate)">JHS 3 (BECE Candidate)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>📧 Email Address *</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label>📱 Phone Number *</label>
                <input type="tel" id="phone" placeholder="e.g., 0244123456" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>👨‍👩 Parent/Guardian Name *</label>
                    <input type="text" id="parentName" placeholder="Parent's full name" required>
                </div>
                <div class="form-group">
                    <label>📞 Parent Phone *</label>
                    <input type="tel" id="parentPhone" placeholder="Parent's phone number" required>
                </div>
            </div>

            <div class="form-group">
                <label>🔑 Create Password *</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>

            <button type="submit" class="btn-register">📝 Register & Start Learning →</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get all form values
            const studentData = {
                id: Date.now(),
                fullName: document.getElementById('studentName').value,
                dateOfBirth: document.getElementById('dob').value,
                school: document.getElementById('school').value,
                class: document.getElementById('class').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                parentName: document.getElementById('parentName').value,
                parentPhone: document.getElementById('parentPhone').value,
                password: document.getElementById('password').value,
                registeredDate: new Date().toISOString(),
                practiceStats: { total: 0, correct: 0, points: 0 },
                courseProgress: {}
            };
            
            // Save to localStorage
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));
            
            // Save current student session
            localStorage.setItem('currentStudent', JSON.stringify({
                id: studentData.id,
                name: studentData.fullName,
                email: studentData.email
            }));
            
            // Save scholar name for dashboard
            localStorage.setItem('scholarName', studentData.fullName);
            localStorage.setItem('scholarEmail', studentData.email);
            
            alert(`✅ Welcome ${studentData.fullName}!\n\nYour registration was successful!\n\nYou will now be redirected to your dashboard.`);
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>m
