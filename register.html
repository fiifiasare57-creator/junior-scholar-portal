<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Glassmorphism Container */
        .register-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #f0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: white;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            background: #f8f9ff;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .login-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.3);
            backdrop-filter: blur(5px);
            color: white;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(5px);
            color: white;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .register-container {
                padding: 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Create Your Account</h1>
        <p class="subtitle">Join the journey to BECE excellence</p>

        <div id="successMsg" class="success-message"></div>
        <div id="errorMsg" class="error-message"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>👤 Full Name *</label>
                    <input type="text" id="fullName" placeholder="e.g., Kwame Asare" required>
                </div>
                <div class="form-group">
                    <label>🎂 Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>🏫 School *</label>
                    <input type="text" id="school" placeholder="e.g., Presec Legon" required>
                </div>
                <div class="form-group">
                    <label>📚 Class *</label>
                    <select id="class" required>
                        <option value="">Select Class</option>
                        <option value="JHS 1">JHS 1</option>
                        <option value="JHS 2">JHS 2</option>
                        <option value="JHS 3 (BECE Candidate)">JHS 3 (BECE Candidate)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>📧 Email Address *</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label>📱 Phone Number *</label>
                <input type="tel" id="phone" placeholder="e.g., 0244123456" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>👨‍👩 Parent/Guardian *</label>
                    <input type="text" id="parentName" placeholder="Parent's full name" required>
                </div>
                <div class="form-group">
                    <label>📞 Parent Phone *</label>
                    <input type="tel" id="parentPhone" placeholder="Parent's phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>🔑 Password *</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>

            <div class="form-group">
                <label>🔑 Confirm Password *</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn-register">📝 Register & Start Learning →</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get all values
            const fullName = document.getElementById('fullName').value.trim();
            const dob = document.getElementById('dob').value;
            const school = document.getElementById('school').value.trim();
            const studentClass = document.getElementById('class').value;
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const parentName = document.getElementById('parentName').value.trim();
            const parentPhone = document.getElementById('parentPhone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Clear previous messages
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            
            // Validate
            if (!fullName || !dob || !school || !studentClass || !email || !phone || !parentName || !parentPhone || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Validate phone (Ghana format)
            const phoneRegex = /^0[0-9]{9}$/;
            if (!phoneRegex.test(phone)) {
                showError('Please enter a valid 10-digit phone number (e.g., 0244123456)');
                return;
            }
            
            // Check if email already exists
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            if (students.some(s => s.email === email)) {
                showError('❌ This email is already registered. Please login instead.');
                return;
            }
            
            // Create student object
            const studentData = {
                id: Date.now(),
                fullName: fullName,
                dateOfBirth: dob,
                school: school,
                class: studentClass,
                email: email,
                phone: phone,
                parentName: parentName,
                parentPhone: parentPhone,
                password: password,
                registeredDate: new Date().toISOString(),
                practiceStats: {
                    total: 0,
                    correct: 0,
                    points: 0
                },
                courseProgress: {}
            };
            
            // Add to students list
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));
            
            // Initialize empty data for this student
            localStorage.setItem('studentAttendance_' + studentData.id, JSON.stringify([]));
            localStorage.setItem('submissions_' + studentData.id, JSON.stringify({}));
            
            // Save current session
            localStorage.setItem('currentStudent', JSON.stringify({
                id: studentData.id,
                name: studentData.fullName,
                email: studentData.email
            }));
            
            // Save scholar name for dashboard
            localStorage.setItem('scholarName', studentData.fullName);
            localStorage.setItem('scholarEmail', studentData.email);
            
            // Initialize practice stats
            localStorage.setItem('practiceStats', JSON.stringify(studentData.practiceStats));
            localStorage.setItem('courseProgress', JSON.stringify(studentData.courseProgress));
            
            // Show success message
            showSuccess(`✅ Registration successful! Welcome ${fullName}! Redirecting to dashboard...`);
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        });
        
        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
