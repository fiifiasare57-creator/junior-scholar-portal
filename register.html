<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register & Pay - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .payment-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .payment-badge .amount {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .payment-details {
            background: #f8fafc;
            border-radius: 0.75rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
        }

        .payment-number {
            background: #667eea;
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0.5rem 0;
        }

        .copy-btn {
            background: #e2e8f0;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .register-container {
                padding: 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Register & Pay School Fees</h1>
        <p class="subtitle">Create your account and get full access</p>

        <div class="payment-badge">
            <div>🎓 Registration + Access Fee</div>
            <div class="amount">GHS 100</div>
            <div style="font-size: 0.7rem;">(One-time payment for full access)</div>
        </div>

        <div id="successMsg" class="success-message"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>👤 Full Name *</label>
                    <input type="text" id="fullName" placeholder="e.g., Kwame Asare" required>
                </div>
                <div class="form-group">
                    <label>🎂 Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>🏫 School *</label>
                    <input type="text" id="school" placeholder="e.g., Presec Legon" required>
                </div>
                <div class="form-group">
                    <label>📚 Class *</label>
                    <select id="class" required>
                        <option value="">Select Class</option>
                        <option value="JHS 1">JHS 1</option>
                        <option value="JHS 2">JHS 2</option>
                        <option value="JHS 3 (BECE Candidate)">JHS 3 (BECE Candidate)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>📧 Email *</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label>📱 Phone Number *</label>
                <input type="tel" id="phone" placeholder="e.g., 0244123456" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>👨‍👩 Parent/Guardian *</label>
                    <input type="text" id="parentName" placeholder="Parent's full name" required>
                </div>
                <div class="form-group">
                    <label>📞 Parent Phone *</label>
                    <input type="tel" id="parentPhone" placeholder="Parent's phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>🔑 Password *</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>

            <!-- Payment Details Section -->
            <div class="payment-details">
                <div style="text-align: center; margin-bottom: 0.5rem;">
                    <strong>📱 Send Payment To:</strong>
                </div>
                <div class="payment-number" id="paymentNumber">
                    055 967 4720
                </div>
                <div style="text-align: center;">
                    <button type="button" class="copy-btn" onclick="copyNumber()">📋 Copy Number</button>
                </div>
                <div style="font-size: 0.7rem; color: #6b7280; margin-top: 0.5rem; text-align: center;">
                    Amount: <strong>GHS 100</strong><br>
                    Reference: <strong id="paymentRef">Loading...</strong>
                </div>
            </div>

            <div class="form-group">
                <label>📱 Transaction ID (after payment)</label>
                <input type="text" id="transactionId" placeholder="Enter the transaction ID from your mobile money">
            </div>

            <button type="submit" class="btn-register">✅ Register & Verify Payment →</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        // Payment number
        const PAYMENT_NUMBER = '0559674720';

        function copyNumber() {
            navigator.clipboard.writeText(PAYMENT_NUMBER);
            alert('✅ Mobile Money number copied: 055 967 4720');
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get all values
            const fullName = document.getElementById('fullName').value.trim();
            const dob = document.getElementById('dob').value;
            const school = document.getElementById('school').value.trim();
            const studentClass = document.getElementById('class').value;
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const parentName = document.getElementById('parentName').value.trim();
            const parentPhone = document.getElementById('parentPhone').value.trim();
            const password = document.getElementById('password').value;
            const transactionId = document.getElementById('transactionId').value.trim();
            
            // Validate
            if (!fullName || !dob || !school || !studentClass || !email || !phone || !parentName || !parentPhone || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            if (!transactionId) {
                alert('Please enter the transaction ID from your mobile money payment');
                return;
            }
            
            // Check if email already exists
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            if (students.some(s => s.email === email)) {
                alert('❌ This email is already registered. Please login instead.');
                return;
            }
            
            // Generate unique reference
            const reference = `JSP${Date.now()}`;
            
            // Calculate expiry date (1 year from now)
            let expiryDate = new Date();
            expiryDate.setFullYear(expiryDate.getFullYear() + 1);
            
            // Create student object with payment status
            const studentData = {
                id: Date.now(),
                fullName: fullName,
                dateOfBirth: dob,
                school: school,
                class: studentClass,
                email: email,
                phone: phone,
                parentName: parentName,
                parentPhone: parentPhone,
                password: password,
                registeredDate: new Date().toISOString(),
                hasAccess: true,
                accessExpiry: expiryDate.toISOString(),
                payment: {
                    amount: 100,
                    transactionId: transactionId,
                    paymentNumber: PAYMENT_NUMBER,
                    reference: reference,
                    paymentDate: new Date().toISOString(),
                    verified: true
                },
                practiceStats: {
                    total: 0,
                    correct: 0,
                    points: 0
                },
                courseProgress: {}
            };
            
            // Add to students list
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));
            
            // Initialize empty data for this student
            localStorage.setItem('studentAttendance_' + studentData.id, JSON.stringify([]));
            localStorage.setItem('submissions_' + studentData.id, JSON.stringify({}));
            
            // Save payment record
            let payments = JSON.parse(localStorage.getItem('paymentHistory') || '[]');
            payments.push({
                studentId: studentData.id,
                studentName: fullName,
                studentEmail: email,
                amount: 100,
                transactionId: transactionId,
                reference: reference,
                paymentDate: new Date().toISOString(),
                expiryDate: expiryDate.toISOString()
            });
            localStorage.setItem('paymentHistory', JSON.stringify(payments));
            
            // Save access status
            const accessData = {
                active: true,
                startDate: new Date().toISOString(),
                expiryDate: expiryDate.toISOString(),
                transactionId: transactionId,
                verified: true
            };
            localStorage.setItem('accessStatus', JSON.stringify(accessData));
            
            // Save current session
            localStorage.setItem('currentStudent', JSON.stringify({
                id: studentData.id,
                name: studentData.fullName,
                email: studentData.email
            }));
            
            // Save scholar name for dashboard
            localStorage.setItem('scholarName', studentData.fullName);
            localStorage.setItem('scholarEmail', studentData.email);
            
            // Initialize practice stats
            localStorage.setItem('practiceStats', JSON.stringify(studentData.practiceStats));
            localStorage.setItem('courseProgress', JSON.stringify(studentData.courseProgress));
            
            // Show success message
            const successMsg = document.getElementById('successMsg');
            successMsg.innerHTML = `✅ Payment Verified! Welcome ${fullName}! Your access is active until ${expiryDate.toLocaleDateString()}. Redirecting to dashboard...`;
            successMsg.style.display = 'block';
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 3000);
        });

        // Generate reference on page load
        const reference = `JSP${Date.now()}`;
        document.getElementById('paymentRef').textContent = reference;
    </script>
</body>
</html>
