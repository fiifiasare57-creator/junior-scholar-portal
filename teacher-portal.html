<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1a2c3e;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6366f1;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: white;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #6366f1;
            color: white;
        }

        .card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eef2f6;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
        }

        .assignment-item, .note-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .student-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .badge {
            background: #10b981;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">👨‍🏫 Teacher Portal | The Junior Scholar Portal</a>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('assignments')">📝 Assignments</button>
            <button class="tab-btn" onclick="showTab('notes')">📚 Notes & Resources</button>
            <button class="tab-btn" onclick="showTab('students')">👥 Students</button>
            <button class="tab-btn" onclick="showTab('submissions')">📋 Submissions</button>
        </div>

        <!-- Assignments Tab -->
        <div id="assignmentsTab">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">➕ Create New Assignment</h3>
                </div>
                <form id="assignmentForm">
                    <div class="form-group">
                        <label>Subject</label>
                        <select id="assignSubject" required>
                            <option value="">Select Subject</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="English">English Language</option>
                            <option value="Science">Integrated Science</option>
                            <option value="Social Studies">Social Studies</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assignment Title</label>
                        <input type="text" id="assignTitle" placeholder="e.g., Algebra Worksheet" required>
                    </div>
                    <div class="form-group">
                        <label>Description / Instructions</label>
                        <textarea id="assignDesc" rows="3" placeholder="Describe the assignment..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="assignDue" required>
                    </div>
                    <button type="submit" class="btn-primary">📤 Send to Students →</button>
                </form>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📋 Active Assignments</h3>
                </div>
                <div id="assignmentsList"></div>
            </div>
        </div>

        <!-- Notes Tab -->
        <div id="notesTab" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📝 Share Notes & Resources</h3>
                </div>
                <form id="noteForm">
                    <div class="form-group">
                        <label>Subject</label>
                        <select id="noteSubject" required>
                            <option value="">Select Subject</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="English">English Language</option>
                            <option value="Science">Integrated Science</option>
                            <option value="Social Studies">Social Studies</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="noteTitle" placeholder="e.g., Algebra Notes - Chapter 1" required>
                    </div>
                    <div class="form-group">
                        <label>Content / Notes</label>
                        <textarea id="noteContent" rows="5" placeholder="Write your notes here..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Resource Link (Optional)</label>
                        <input type="text" id="noteLink" placeholder="https://drive.google.com/...">
                    </div>
                    <button type="submit" class="btn-primary">📤 Share with Students →</button>
                </form>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📚 Shared Notes & Resources</h3>
                </div>
                <div id="notesList"></div>
            </div>
        </div>

        <!-- Students Tab -->
        <div id="studentsTab" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">👥 Registered Students</h3>
                </div>
                <div id="studentsList"></div>
            </div>
        </div>

        <!-- Submissions Tab -->
        <div id="submissionsTab" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📋 Student Submissions</h3>
                </div>
                <div id="submissionsList"></div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let assignments = JSON.parse(localStorage.getItem('teacherAssignments') || '[]');
        let notes = JSON.parse(localStorage.getItem('teacherNotes') || '[]');

        function saveAssignments() {
            localStorage.setItem('teacherAssignments', JSON.stringify(assignments));
        }

        function saveNotes() {
            localStorage.setItem('teacherNotes', JSON.stringify(notes));
        }

        // Show tab
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('assignmentsTab').style.display = 'none';
            document.getElementById('notesTab').style.display = 'none';
            document.getElementById('studentsTab').style.display = 'none';
            document.getElementById('submissionsTab').style.display = 'none';
            
            if (tab === 'assignments') {
                document.getElementById('assignmentsTab').style.display = 'block';
                loadAssignments();
            } else if (tab === 'notes') {
                document.getElementById('notesTab').style.display = 'block';
                loadNotes();
            } else if (tab === 'students') {
                document.getElementById('studentsTab').style.display = 'block';
                loadStudents();
            } else if (tab === 'submissions') {
                document.getElementById('submissionsTab').style.display = 'block';
                loadSubmissions();
            }
        }

        // Create Assignment
        document.getElementById('assignmentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const assignment = {
                id: Date.now(),
                subject: document.getElementById('assignSubject').value,
                title: document.getElementById('assignTitle').value,
                description: document.getElementById('assignDesc').value,
                dueDate: document.getElementById('assignDue').value,
                createdAt: new Date().toISOString()
            };
            
            assignments.unshift(assignment);
            saveAssignments();
            
            alert(`✅ Assignment "${assignment.title}" sent to all students!`);
            e.target.reset();
            loadAssignments();
        });

        function loadAssignments() {
            const container = document.getElementById('assignmentsList');
            if (assignments.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b;">No assignments created yet.</p>';
                return;
            }
            
            container.innerHTML = assignments.map(a => `
                <div class="assignment-item">
                    <div>
                        <strong>${a.subject}: ${a.title}</strong>
                        <p style="font-size: 0.8rem; margin-top: 0.25rem;">📅 Due: ${a.dueDate}</p>
                        <p style="font-size: 0.8rem; color: #64748b;">${a.description.substring(0, 100)}...</p>
                    </div>
                    <button onclick="deleteAssignment(${a.id})" style="background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; cursor: pointer;">Delete</button>
                </div>
            `).join('');
        }

        function deleteAssignment(id) {
            assignments = assignments.filter(a => a.id !== id);
            saveAssignments();
            loadAssignments();
        }

        // Create Note
        document.getElementById('noteForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const note = {
                id: Date.now(),
                subject: document.getElementById('noteSubject').value,
                title: document.getElementById('noteTitle').value,
                content: document.getElementById('noteContent').value,
                link: document.getElementById('noteLink').value,
                createdAt: new Date().toISOString()
            };
            
            notes.unshift(note);
            saveNotes();
            
            alert(`✅ Notes "${note.title}" shared with all students!`);
            e.target.reset();
            loadNotes();
        });

        function loadNotes() {
            const container = document.getElementById('notesList');
            if (notes.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b;">No notes shared yet.</p>';
                return;
            }
            
            container.innerHTML = notes.map(n => `
                <div class="assignment-item">
                    <div>
                        <strong>${n.subject}: ${n.title}</strong>
                        <p style="font-size: 0.8rem; margin-top: 0.25rem;">${n.content.substring(0, 150)}...</p>
                        ${n.link ? `<p style="font-size: 0.7rem; color: #6366f1;">🔗 ${n.link}</p>` : ''}
                    </div>
                    <button onclick="deleteNote(${n.id})" style="background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; cursor: pointer;">Delete</button>
                </div>
            `).join('');
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveNotes();
            loadNotes();
        }

        // Load Students
        function loadStudents() {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const container = document.getElementById('studentsList');
            
            if (students.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b;">No students registered yet.</p>';
                return;
            }
            
            container.innerHTML = students.map(s => {
                const stats = s.practiceStats || { total: 0, correct: 0, points: 0 };
                const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                return `
                    <div class="student-card">
                        <div>
                            <strong>${s.fullName}</strong>
                            <p style="font-size: 0.7rem;">📧 ${s.email} | 📱 ${s.phone}</p>
                            <p style="font-size: 0.7rem;">🏫 ${s.school} | 📚 ${s.class}</p>
                        </div>
                        <div style="text-align: right;">
                            <span class="badge">${accuracy}% Accuracy</span>
                            <p style="font-size: 0.7rem; margin-top: 0.25rem;">📝 ${stats.total} Qs | ⭐ ${stats.points || 0} pts</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load Submissions
        function loadSubmissions() {
            const submissions = JSON.parse(localStorage.getItem('allSubmissions') || '[]');
            const container = document.getElementById('submissionsList');
            
            if (submissions.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b;">No submissions yet.</p>';
                return;
            }
            
            container.innerHTML = submissions.reverse().map(sub => `
                <div class="student-card" style="flex-direction: column; align-items: flex-start;">
                    <div style="display: flex; justify-content: space-between; width: 100%;">
                        <strong>${sub.studentName}</strong>
                        <span style="font-size: 0.7rem; color: #6366f1;">${sub.date}</span>
                    </div>
                    <p style="margin-top: 0.5rem;"><strong>Assignment:</strong> ${sub.title}</p>
                    <p style="font-size: 0.85rem; margin-top: 0.25rem;">"${sub.answer.substring(0, 200)}${sub.answer.length > 200 ? '...' : ''}"</p>
                </div>
            `).join('');
        }

        // Initial load
        loadAssignments();
    </script>
</body>
</html>
