<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #10b981;
        }

        .btn-secondary:hover {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .admin-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .admin-toggle {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .admin-code {
            display: none;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Welcome!</h1>
        <p class="subtitle">Enter as a student - no registration needed</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Quick Student Access - No Registration Required -->
        <div class="form-group">
            <label>👨‍🎓 Quick Student Access Code</label>
            <input type="password" id="studentAccessCode" placeholder="Enter access code">
        </div>
        <button class="btn-login btn-secondary" onclick="quickStudentAccess()">🎓 Enter as Student →</button>

        <div class="divider">OR</div>

        <!-- Optional: Create your own private student profile -->
        <form id="studentForm">
            <div class="form-group">
                <label>👤 Your Name</label>
                <input type="text" id="studentName" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>📧 Email (optional)</label>
                <input type="email" id="studentEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>📚 Your Class</label>
                <select id="studentClass">
                    <option value="Grade 7">Grade 7</option>
                    <option value="Grade 8">Grade 8</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                </select>
            </div>
            <div class="form-group">
                <label>🏫 School Name</label>
                <input type="text" id="studentSchool" placeholder="Your school name" value="Junior Academy">
            </div>
            <button type="submit" class="btn-login">📝 Create & Enter →</button>
        </form>

        <div class="admin-section">
            <div class="admin-toggle" onclick="toggleAdminCode()">🔐 Teacher Access ▼</div>
            <div class="admin-code" id="adminCode">
                <div class="form-group">
                    <label>🔑 Teacher Secret Code</label>
                    <input type="password" id="secretCode" placeholder="Enter teacher code">
                </div>
                <button type="button" class="btn-login" onclick="adminLogin()" style="background: #10b981;">👨‍🏫 Enter Teacher Portal</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBdX12Kbhb8L1R",
            authDomain: "junior-scholar-portal.firebaseapp.com",
            projectId: "junior-scholar-portal",
            storageBucket: "junior-scholar-portal.firebasestorage.app",
            messagingSenderId: "519496965849",
            appId: "1:519496965849:web:86",
            databaseURL: "https://junior-scholar-portal-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🔒 YOUR SECRET CODES - Only you know these!
        const STUDENT_ACCESS_CODE = "enter123";     // CHANGE THIS to your secret student code
        const TEACHER_SECRET_CODE = "nkb gf";       // Teacher portal access code

        // Quick student access with code (no registration)
        function quickStudentAccess() {
            const code = document.getElementById('studentAccessCode').value;
            
            if (code === STUDENT_ACCESS_CODE) {
                // Create a temporary student session
                const tempStudentId = 'student_' + Date.now();
                const tempStudent = {
                    id: tempStudentId,
                    name: "Quick Access Student",
                    email: "quick@student.local",
                    class: "Grade 7",
                    school: "Junior Academy"
                };
                
                // Save to Firebase
                database.ref(`students/${tempStudentId}`).set({
                    fullName: tempStudent.name,
                    email: tempStudent.email,
                    class: tempStudent.class,
                    school: tempStudent.school,
                    practiceStats: { total: 0, correct: 0, points: 0 },
                    joinedAt: new Date().toISOString(),
                    quickAccess: true
                });
                
                localStorage.setItem('currentStudent', JSON.stringify(tempStudent));
                localStorage.setItem('scholarName', tempStudent.name);
                localStorage.setItem('scholarEmail', tempStudent.email);
                
                showSuccess('✅ Access granted! Redirecting to dashboard...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showError('❌ Invalid access code!');
            }
        }

        // Create your own student profile (optional)
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('studentName').value;
            const email = document.getElementById('studentEmail').value || `${name.replace(/\s/g, '')}@student.local`;
            const className = document.getElementById('studentClass').value;
            const school = document.getElementById('studentSchool').value;
            
            if (!name) {
                showError('Please enter your name');
                return;
            }
            
            const studentId = 'student_' + Date.now();
            const studentData = {
                fullName: name,
                email: email,
                class: className,
                school: school,
                practiceStats: { total: 0, correct: 0, points: 0 },
                joinedAt: new Date().toISOString()
            };
            
            await database.ref(`students/${studentId}`).set(studentData);
            
            localStorage.setItem('currentStudent', JSON.stringify({
                id: studentId,
                name: name,
                email: email
            }));
            localStorage.setItem('scholarName', name);
            localStorage.setItem('scholarEmail', email);
            
            showSuccess(`✅ Welcome ${name}! Redirecting to dashboard...`);
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });

        function toggleAdminCode() {
            const adminDiv = document.getElementById('adminCode');
            adminDiv.style.display = adminDiv.style.display === 'none' ? 'block' : 'none';
        }

        async function adminLogin() {
            const code = document.getElementById('secretCode').value;
            if (code === TEACHER_SECRET_CODE) {
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentStudent', JSON.stringify({
                    id: 'admin',
                    name: 'Teacher',
                    email: 'teacher@portal.com'
                }));
                showSuccess('✅ Teacher access granted! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'teacher-portal.html';
                }, 1000);
            } else {
                showError('❌ Invalid teacher code!');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
