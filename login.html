<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .register-link a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .demo-mode {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #eef2f6;
            text-align: center;
        }

        .demo-btn {
            background: #f1f5f9;
            color: #6366f1;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Welcome Back!</h1>
        <p class="subtitle">Login to continue your learning journey</p>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">🔓 Login →</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>

        <div class="demo-mode">
            <small style="color: #6b7280;">Demo Mode</small><br>
            <a href="#" class="demo-btn" id="demoLoginBtn">Continue as Guest</a>
        </div>
    </div>

    <script>
        // Demo login (guest mode)
        document.getElementById('demoLoginBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.setItem('currentStudent', JSON.stringify({
                id: 'guest',
                name: 'Guest User',
                email: 'guest@example.com'
            }));
            localStorage.setItem('scholarName', 'Guest User');
            localStorage.setItem('scholarEmail', 'guest@example.com');
            window.location.href = 'dashboard.html';
        });

        // Regular login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Get all registered students
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            
            // Find student with matching email and password
            const student = students.find(s => s.email === email && s.password === password);
            
            if (student) {
                // Save current student session
                localStorage.setItem('currentStudent', JSON.stringify({
                    id: student.id,
                    name: student.fullName,
                    email: student.email
                }));
                
                // Save scholar name for dashboard
                localStorage.setItem('scholarName', student.fullName);
                localStorage.setItem('scholarEmail', student.email);
                
                // Initialize empty data structures if not exist
                if (!student.practiceStats) {
                    student.practiceStats = { total: 0, correct: 0, points: 0 };
                }
                if (!student.courseProgress) {
                    student.courseProgress = {};
                }
                
                // Load practice stats
                localStorage.setItem('practiceStats', JSON.stringify(student.practiceStats));
                localStorage.setItem('courseProgress', JSON.stringify(student.courseProgress));
                
                // Load attendance records
                const attendanceRecords = JSON.parse(localStorage.getItem('studentAttendance_' + student.id) || '[]');
                localStorage.setItem('studentAttendance', JSON.stringify(attendanceRecords));
                
                alert(`✅ Welcome back, ${student.fullName}!`);
                window.location.href = 'dashboard.html';
            } else {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = '❌ Invalid email or password. Please try again or register.';
                errorDiv.style.display = 'block';
                
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
