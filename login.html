<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .btn-student {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .btn-student:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-teacher {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-teacher:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .teacher-section {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
        }

        .teacher-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .demo-note {
            background: #fef3c7;
            color: #92400e;
            padding: 0.5rem;
            border-radius: 0.5rem;
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        
        <h1>Welcome to Junior Scholar Portal</h1>

        <div class="error-message" id="errorMessage"></div>

        <!-- BIG STUDENT BUTTON - ONE CLICK ACCESS -->
        <button class="btn-student" onclick="enterAsStudent()">
            🎓 Enter as Student (Free Access)
        </button>

        <div class="divider">————————  OR  ————————</div>

        <!-- Teacher Access Section -->
        <div class="teacher-section">
            <button class="btn-teacher" onclick="showTeacherLogin()">
                👨‍🏫 Teacher Login
            </button>
            <div id="teacherPanel" style="display: none; margin-top: 1rem;">
                <input type="password" id="teacherCode" class="teacher-input" placeholder="Enter Teacher Code">
                <button class="btn-teacher" onclick="enterAsTeacher()" style="margin-top: 0;">Login as Teacher</button>
            </div>
        </div>

        <div class="demo-note">
            💡 Student Access: Just click the green button above - no registration needed!
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdX12Kbhb8L1R",
            authDomain: "junior-scholar-portal.firebaseapp.com",
            projectId: "junior-scholar-portal",
            storageBucket: "junior-scholar-portal.firebasestorage.app",
            messagingSenderId: "519496965849",
            appId: "1:519496965849:web:86",
            databaseURL: "https://junior-scholar-portal-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // TEACHER SECRET CODE - Only you know this
        const TEACHER_CODE = "nkb gf";

        // STUDENT ENTRY - ONE CLICK, NO REGISTRATION NEEDED
        async function enterAsStudent() {
            // Create a simple student profile automatically
            const studentId = 'student_' + Date.now();
            const studentName = "Scholar_" + Math.floor(Math.random() * 1000);
            
            const studentData = {
                fullName: studentName,
                email: studentName + "@student.local",
                class: "Grade 7",
                school: "Junior Scholar Academy",
                practiceStats: { total: 0, correct: 0, points: 0 },
                joinedAt: new Date().toISOString()
            };
            
            await database.ref(`students/${studentId}`).set(studentData);
            
            localStorage.setItem('currentStudent', JSON.stringify({
                id: studentId,
                name: studentName,
                email: studentData.email
            }));
            
            window.location.href = 'dashboard.html';
        }

        function showTeacherLogin() {
            const panel = document.getElementById('teacherPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        async function enterAsTeacher() {
            const code = document.getElementById('teacherCode').value;
            
            if (code === TEACHER_CODE) {
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentStudent', JSON.stringify({
                    id: 'admin',
                    name: 'Teacher',
                    email: 'teacher@portal.com'
                }));
                window.location.href = 'teacher-portal.html';
            } else {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = '❌ Invalid teacher code!';
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 2000);
            }
        }
    </script>
</body>
</html>
