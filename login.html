<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Junior Scholar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .admin-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .admin-toggle {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .admin-toggle:hover {
            color: #667eea;
        }

        .admin-code {
            display: none;
            margin-top: 1rem;
        }

        .admin-code input {
            background: #f8fafc;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <div class="logo-text">The Junior Scholar Portal</div>
        </div>
        <h1>Welcome Back!</h1>
        <p class="subtitle">Login to continue your learning journey</p>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">🔓 Login →</button>
        </form>

        <div class="admin-section">
            <div class="admin-toggle" onclick="toggleAdminCode()">🔐 Admin Access ▼</div>
            <div class="admin-code" id="adminCode">
                <div class="form-group">
                    <label>🔑 Secret Code</label>
                    <input type="password" id="secretCode" placeholder="Enter admin code">
                </div>
                <button type="button" class="btn-login" onclick="adminLogin()" style="background: #10b981;">👨‍💻 Admin Login</button>
            </div>
        </div>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIGURATION ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBdX12Kbhb8L1R",
            authDomain: "junior-scholar-portal.firebaseapp.com",
            projectId: "junior-scholar-portal",
            storageBucket: "junior-scholar-portal.firebasestorage.app",
            messagingSenderId: "519496965849",
            appId: "1:519496965849:web:86",
            databaseURL: "https://junior-scholar-portal-default-rtdb.firebaseio.com/"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Secret admin code
        const SECRET_CODE = "nkb gf";

        function toggleAdminCode() {
            const adminDiv = document.getElementById('adminCode');
            if (adminDiv.style.display === 'none' || adminDiv.style.display === '') {
                adminDiv.style.display = 'block';
            } else {
                adminDiv.style.display = 'none';
            }
        }

        async function adminLogin() {
            const code = document.getElementById('secretCode').value;
            
            if (code === SECRET_CODE) {
                // Admin login successful
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentStudent', JSON.stringify({
                    id: 'admin',
                    name: 'Administrator',
                    email: 'admin@juniorscholar.com'
                }));
                localStorage.setItem('scholarName', 'Administrator');
                alert('✅ Admin access granted! Redirecting to Teacher Portal...');
                window.location.href = 'teacher-portal.html';
            } else {
                alert('❌ Invalid secret code!');
            }
        }

        // Regular student login with Firebase
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Find student in Firebase by email
            const snapshot = await database.ref('students').orderByChild('email').equalTo(email).once('value');
            
            if (snapshot.exists()) {
                let student = null;
                let studentId = null;
                snapshot.forEach(child => {
                    student = child.val();
                    studentId = child.key;
                });
                
                if (student && student.password === password) {
                    // Login successful
                    localStorage.setItem('currentStudent', JSON.stringify({
                        id: studentId,
                        name: student.fullName,
                        email: student.email
                    }));
                    localStorage.setItem('scholarName', student.fullName);
                    localStorage.setItem('scholarEmail', student.email);
                    localStorage.setItem('practiceStats', JSON.stringify(student.practiceStats || { total: 0, correct: 0, points: 0 }));
                    localStorage.setItem('courseProgress', JSON.stringify(student.courseProgress || {}));
                    
                    alert(`✅ Welcome back, ${student.fullName}!`);
                    window.location.href = 'dashboard.html';
                } else {
                    showError('❌ Invalid password. Please try again.');
                }
            } else {
                showError('❌ No account found with this email. Please register first.');
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
