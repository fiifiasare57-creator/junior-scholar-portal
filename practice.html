<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Practice - The Junior Scholar Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e2e8f0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #3b82f6;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #64748b;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #3b82f6;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        /* Subject Selector */
        .subject-selector {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .subject-btn {
            padding: 0.75rem 1.5rem;
            background: #f1f5f9;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .subject-btn.active {
            background: #3b82f6;
            color: white;
        }

        .subject-btn:hover {
            transform: translateY(-2px);
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .mode-btn {
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #f59e0b;
            border-color: #f59e0b;
            color: white;
        }

        /* Question Card */
        .question-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #3b82f6;
            background: #f8fafc;
        }

        .option.selected {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .option.correct {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .option.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .option-letter {
            font-weight: 700;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 0.5rem;
        }

        .option-text {
            flex: 1;
        }

        /* Feedback */
        .feedback {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .feedback.correct {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            color: #166534;
        }

        .feedback.wrong {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-nav {
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-nav:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-nav:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        /* Results Card */
        .results-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto;
        }

        .score-number {
            font-size: 3rem;
            font-weight: 800;
            color: white;
        }

        .btn-restart {
            padding: 0.75rem 2rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }

        /* Challenge Mode */
        .challenge-info {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .timer {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Leaderboard */
        .leaderboard-section {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 2rem;
            border: 1px solid #e2e8f0;
        }

        .leaderboard-list {
            margin-top: 1rem;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .rank {
            font-weight: 700;
            width: 40px;
        }

        .name {
            flex: 1;
        }

        .score {
            font-weight: 600;
            color: #3b82f6;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 1rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            
            .nav-links.active {
                display: flex;
            }
            
            .container {
                padding: 1rem;
            }
            
            .question-text {
                font-size: 1rem;
            }
            
            .option {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">The Junior Scholar Portal</span>
            </a>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="courses.html">Courses</a>
                <a href="live-class.html">Live Classes</a>
                <a href="practice.html" class="active">Practice</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📝 Practice Questions</h1>
            <p>Test your knowledge with BECE-style questions</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-cards" id="statsCards">
            <div class="stat-card">
                <div class="stat-value" id="totalQuestions">0</div>
                <div class="stat-label">Questions Answered</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="correctAnswers">0</div>
                <div class="stat-label">Correct Answers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracyRate">0%</div>
                <div class="stat-label">Accuracy Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPoints">0</div>
                <div class="stat-label">Total Points</div>
            </div>
        </div>

        <!-- Subject Selector -->
        <div class="subject-selector" id="subjectSelector"></div>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="practice">📖 Practice Mode</button>
            <button class="mode-btn" data-mode="challenge">⚡ Challenge Mode</button>
        </div>

        <!-- Question Container -->
        <div id="questionContainer"></div>
    </div>

    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Question Bank
        const questionBank = {
            mathematics: [
                {
                    id: 1,
                    text: "What is the value of 25 × 4?",
                    options: ["75", "100", "125", "150"],
                    correct: 1,
                    explanation: "25 × 4 = 100. This is basic multiplication."
                },
                {
                    id: 2,
                    text: "If x + 5 = 12, what is the value of x?",
                    options: ["5", "6", "7", "8"],
                    correct: 2,
                    explanation: "x = 12 - 5 = 7"
                },
                {
                    id: 3,
                    text: "What is 15% of 200?",
                    options: ["15", "20", "25", "30"],
                    correct: 3,
                    explanation: "15% of 200 = (15/100) × 200 = 30"
                },
                {
                    id: 4,
                    text: "Simplify: 3(2x + 4)",
                    options: ["6x + 4", "6x + 12", "5x + 7", "6x + 7"],
                    correct: 1,
                    explanation: "3(2x + 4) = 3×2x + 3×4 = 6x + 12"
                },
                {
                    id: 5,
                    text: "What is the square root of 144?",
                    options: ["10", "11", "12", "13"],
                    correct: 2,
                    explanation: "12 × 12 = 144, so √144 = 12"
                }
            ],
            english: [
                {
                    id: 1,
                    text: "Choose the correct spelling:",
                    options: ["Accommodate", "Acommodate", "Accomodate", "Acomodate"],
                    correct: 0,
                    explanation: "Accommodate is the correct spelling with double c and double m."
                },
                {
                    id: 2,
                    text: "Which word is an antonym of 'happy'?",
                    options: ["Joyful", "Sad", "Cheerful", "Excited"],
                    correct: 1,
                    explanation: "Sad is the opposite (antonym) of happy."
                },
                {
                    id: 3,
                    text: "Identify the noun in: 'The boy ran quickly.'",
                    options: ["boy", "ran", "quickly", "the"],
                    correct: 0,
                    explanation: "A noun is a person, place, or thing. 'boy' is a person."
                },
                {
                    id: 4,
                    text: "What is the past tense of 'go'?",
                    options: ["Goed", "Went", "Gone", "Going"],
                    correct: 1,
                    explanation: "The past tense of 'go' is 'went'."
                },
                {
                    id: 5,
                    text: "Choose the correct sentence:",
                    options: ["She don't like apples", "She doesn't like apples", "She not like apples", "She didn't liked apples"],
                    correct: 1,
                    explanation: "For third person singular (she), we use 'doesn't'."
                }
            ],
            science: [
                {
                    id: 1,
                    text: "What is the process by which plants make their food?",
                    options: ["Respiration", "Photosynthesis", "Digestion", "Fermentation"],
                    correct: 1,
                    explanation: "Photosynthesis is the process where plants use sunlight to make food."
                },
                {
                    id: 2,
                    text: "Which of these is a mammal?",
                    options: ["Snake", "Lizard", "Whale", "Crocodile"],
                    correct: 2,
                    explanation: "Whales are mammals that give birth to live young and breathe air."
                },
                {
                    id: 3,
                    text: "What is the hardest natural substance?",
                    options: ["Gold", "Iron", "Diamond", "Platinum"],
                    correct: 2,
                    explanation: "Diamond is the hardest natural substance on Earth."
                },
                {
                    id: 4,
                    text: "Which organ pumps blood through the body?",
                    options: ["Brain", "Lungs", "Heart", "Liver"],
                    correct: 2,
                    explanation: "The heart pumps blood throughout the circulatory system."
                },
                {
                    id: 5,
                    text: "What gas do plants absorb during photosynthesis?",
                    options: ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"],
                    correct: 1,
                    explanation: "Plants absorb carbon dioxide and release oxygen."
                }
            ]
        };

        // State variables
        let currentSubject = 'mathematics';
        let currentMode = 'practice';
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let showResults = false;
        let timer = null;
        let timeLeft = 60;
        let challengeActive = false;

        // Load stats from localStorage
        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('practiceStats') || '{"total":0,"correct":0,"points":0}');
            document.getElementById('totalQuestions').textContent = stats.total || 0;
            document.getElementById('correctAnswers').textContent = stats.correct || 0;
            const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
            document.getElementById('accuracyRate').textContent = accuracy + '%';
            document.getElementById('totalPoints').textContent = stats.points || 0;
            return stats;
        }

        // Save stats to localStorage
        function saveStats(isCorrect, pointsEarned = 10) {
            const stats = JSON.parse(localStorage.getItem('practiceStats') || '{"total":0,"correct":0,"points":0}');
            stats.total += 1;
            if (isCorrect) {
                stats.correct += 1;
                stats.points += pointsEarned;
            }
            localStorage.setItem('practiceStats', JSON.stringify(stats));
            loadStats();
            
            // Update dashboard progress
            updateDashboardProgress(stats);
        }

        // Update dashboard
        function updateDashboardProgress(stats) {
            let scholarProgress = JSON.parse(localStorage.getItem('scholarProgress') || '{}');
            scholarProgress.questions = stats.total;
            scholarProgress.accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) + '%' : '0%';
            localStorage.setItem('scholarProgress', JSON.stringify(scholarProgress));
        }

        // Render subject selector
        function renderSubjectSelector() {
            const subjects = [
                { id: 'mathematics', name: '📐 Mathematics', icon: '📐' },
                { id: 'english', name: '📖 English', icon: '📖' },
                { id: 'science', name: '🔬 Science', icon: '🔬' }
            ];
            
            const container = document.getElementById('subjectSelector');
            container.innerHTML = subjects.map(sub => `
                <button class="subject-btn ${currentSubject === sub.id ? 'active' : ''}" 
                        data-subject="${sub.id}">
                    ${sub.icon} ${sub.name.split(' ')[1]}
                </button>
            `).join('');
            
            // Add event listeners
            document.querySelectorAll('.subject-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentSubject = btn.dataset.subject;
                    resetQuiz();
                    renderSubjectSelector();
                    startQuiz();
                });
            });
        }

        // Start quiz
        function startQuiz() {
            currentQuestions = [...questionBank[currentSubject]];
            userAnswers = new Array(currentQuestions.length).fill(null);
            currentIndex = 0;
            showResults = false;
            
            if (currentMode === 'challenge') {
                startChallengeMode();
            } else {
                renderQuestion();
            }
        }

        // Start challenge mode
        function startChallengeMode() {
            challengeActive = true;
            timeLeft = 60;
            const challengeContainer = document.getElementById('questionContainer');
            challengeContainer.innerHTML = `
                <div class="challenge-info">
                    <div>⚡ CHALLENGE MODE ⚡</div>
                    <div class="timer" id="timer">01:00</div>
                    <div>Answer as many questions as you can in 60 seconds!</div>
                </div>
            `;
            renderQuestion();
            startTimer();
        }

        // Start timer
        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endChallenge();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    const timerElement = document.getElementById('timer');
                    if (timerElement) {
                        timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    }
                }
            }, 1000);
        }

        // End challenge
        function endChallenge() {
            challengeActive = false;
            const correctCount = userAnswers.filter((ans, idx) => ans === currentQuestions[idx].correct).length;
            const totalPoints = correctCount * 20;
            showResultsScreen(correctCount, currentQuestions.length, totalPoints);
        }

        // Render current question
        function renderQuestion() {
            if (showResults || currentIndex >= currentQuestions.length) {
                const correctCount = userAnswers.filter((ans, idx) => ans === currentQuestions[idx].correct).length;
                const totalPoints = correctCount * (currentMode === 'challenge' ? 20 : 10);
                showResultsScreen(correctCount, currentQuestions.length, totalPoints);
                return;
            }
            
            const question = currentQuestions[currentIndex];
            const selectedAnswer = userAnswers[currentIndex];
            const container = document.getElementById('questionContainer');
            
            let html = `
                <div class="question-card">
                    <div class="question-text">
                        ${currentIndex + 1}. ${question.text}
                    </div>
                    <div class="options">
            `;
            
            question.options.forEach((opt, idx) => {
                let optionClass = 'option';
                if (selectedAnswer !== null) {
                    if (idx === question.correct) optionClass += ' correct';
                    else if (idx === selectedAnswer && idx !== question.correct) optionClass += ' wrong';
                    else if (idx === selectedAnswer) optionClass += ' selected';
                } else if (selectedAnswer === idx) {
                    optionClass += ' selected';
                }
                
                html += `
                    <div class="${optionClass}" onclick="selectAnswer(${idx})">
                        <div class="option-letter">${String.fromCharCode(65 + idx)}</div>
                        <div class="option-text">${opt}</div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                    ${selectedAnswer !== null ? `
                        <div class="feedback ${selectedAnswer === question.correct ? 'correct' : 'wrong'}">
                            <strong>${selectedAnswer === question.correct ? '✅ Correct!' : '❌ Wrong!'}</strong><br>
                            ${question.explanation}
                        </div>
                    ` : ''}
                    <div class="nav-buttons">
                        <button class="btn-nav" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="btn-nav" onclick="nextQuestion()">${currentIndex === currentQuestions.length - 1 ? 'Finish' : 'Next →'}</button>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        // Select answer
        window.selectAnswer = function(optionIndex) {
            if (userAnswers[currentIndex] !== null) return;
            
            const question = currentQuestions[currentIndex];
            const isCorrect = optionIndex === question.correct;
            const pointsEarned = currentMode === 'challenge' ? 20 : 10;
            
            userAnswers[currentIndex] = optionIndex;
            saveStats(isCorrect, pointsEarned);
            renderQuestion();
        };

        // Next question
        window.nextQuestion = function() {
            if (userAnswers[currentIndex] === null) {
                alert('Please select an answer before continuing!');
                return;
            }
            
            if (currentIndex === currentQuestions.length - 1) {
                if (currentMode === 'challenge' && challengeActive) {
                    clearInterval(timer);
                    endChallenge();
                } else {
                    const correctCount = userAnswers.filter((ans, idx) => ans === currentQuestions[idx].correct).length;
                    const totalPoints = correctCount * 10;
                    showResultsScreen(correctCount, currentQuestions.length, totalPoints);
                }
            } else {
                currentIndex++;
                renderQuestion();
            }
        };

        // Previous question
        window.prevQuestion = function() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        // Show results screen
        function showResultsScreen(correct, total, points) {
            showResults = true;
            const percentage = Math.round((correct / total) * 100);
            let message = '';
            
            if (percentage >= 80) message = '🎉 Excellent! You\'re doing great!';
            else if (percentage >= 60) message = '👍 Good job! Keep practicing!';
            else if (percentage >= 40) message = '📚 Keep going! Review and try again.';
            else message = '💪 Don\'t give up! Practice makes perfect!';
            
            const container = document.getElementById('questionContainer');
            container.innerHTML = `
                <div class="results-card">
                    <h2>📊 Quiz Complete!</h2>
                    <div class="score-circle">
                        <div class="score-number">${percentage}%</div>
                    </div>
                    <p style="font-size: 1.5rem; font-weight: 700; margin: 1rem 0;">
                        ${correct}/${total} Correct
                    </p>
                    <p style="color: #3b82f6; font-size: 1.25rem; margin-bottom: 1rem;">
                        ⭐ +${points} Points Earned!
                    </p>
                    <p style="margin-bottom: 1rem;">${message}</p>
                    <button class="btn-restart" onclick="resetQuiz()">🔄 Practice Again</button>
                    <button class="btn-restart" onclick="changeSubject()" style="margin-left: 1rem; background: #64748b;">📚 Change Subject</button>
                </div>
            `;
            
            // Update leaderboard
            updateLeaderboard(points);
        }

        // Update leaderboard
        function updateLeaderboard(points) {
            let leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]');
            const scholarName = localStorage.getItem('scholarName') || 'You';
            
            leaderboard.push({
                name: scholarName,
                score: points,
                date: new Date().toISOString()
            });
            
            // Keep only top 10
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
        }

        // Reset quiz
        window.resetQuiz = function() {
            if (timer) clearInterval(timer);
            challengeActive = false;
            startQuiz();
        };

        // Change subject
        window.changeSubject = function() {
            resetQuiz();
            // Scroll to subject selector
            document.querySelector('.subject-selector').scrollIntoView({ behavior: 'smooth' });
        };

        // Mode selector
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                resetQuiz();
            });
        });

        // Initialize
        loadStats();
        renderSubjectSelector();
        startQuiz();
    </script>
</body>
</html>
