                studentName: studentName,
                subject: currentSubject,
                questionNumber: questionIndex + 1,

                score: null
            };
            
            await database.ref(`theorySubmissions/${studentId}_${currentSubject}_${questionIndex}`).set(theoryData);
            theorySubmitted[questionIndex] = true;
        }

        async function loadStats() {
            if (studentId && studentId !== 'admin') {
                const snapshot = await database.ref(`students/${studentId}/practiceStats`).once('value');
                studentStats = snapshot.val() || { total: 0, correct: 0, points: 0 };
            } else {
                studentStats = JSON.parse(localStorage.getItem('practiceStats') || '{"total":0,"correct":0,"points":0}');
            }
            document.getElementById('totalQuestions').textContent = studentStats.total;
            document.getElementById('correctAnswers').textContent = studentStats.correct;
            const accuracy = studentStats.total > 0 ? Math.round((studentStats.correct / studentStats.total) * 100) : 0;
            document.getElementById('accuracyRate').textContent = accuracy + '%';
            document.getElementById('totalPoints').textContent = studentStats.points || 0;
        }

        async function saveStats(isCorrect, points = 10) {
            if (studentId && studentId !== 'admin') {
                studentStats.total++;
                if (isCorrect) {
                    studentStats.correct++;
                    studentStats.points = (studentStats.points || 0) + points;
                }
                await database.ref(`students/${studentId}/practiceStats`).set(studentStats);
            } else {
                studentStats.total++;
                if (isCorrect) {
                    studentStats.correct++;
                    studentStats.points = (studentStats.points || 0) + points;
                }
                localStorage.setItem('practiceStats', JSON.stringify(studentStats));
            }
            loadStats();
        }

        function renderSubjects() {
            const subjects = [
                { name: "Mathematics", icon: "📐", description: "Numbers, Algebra, Geometry" },
                { name: "English", icon: "📖", description: "Grammar, Comprehension, Literature" },
                { name: "Science", icon: "🔬", description: "Biology, Chemistry, Physics" },
                { name: "Social Studies", icon: "🌍", description: "Government, History, Geography" }
            ];
            
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = subjects.map(sub => `
                <div class="subject-card" onclick="startQuiz('${sub.name}')">
                    <div class="subject-icon">${sub.icon}</div>
                    <div class="subject-title">${sub.name}</div>
                    <div class="subject-description">${sub.description}</div>
                    <div class="subject-stats">
                        <div class="question-count"><span>20</span> Objectives</div>
                        <div class="difficulty">+ Theory Questions</div>
                    </div>
                    <button class="btn-start">Start Practice →</button>
                </div>
            `).join('');
        }

        function startQuiz(subject) {
            currentSubject = subject;
            const bank = questionBanks[subject];
            currentQuestions = [...bank.objective];
            currentTheory = [...bank.theory];
            userAnswers = new Array(currentQuestions.length).fill(null);
            theoryAnswers = new Array(currentTheory.length).fill("");
            theorySubmitted = new Array(currentTheory.length).fill(false);
            currentIndex = 0;
            correctCount = 0;
            showResults = false;
            
            document.getElementById('modalSubject').innerHTML = `${subject} - BECE Practice`;
            renderQuestion();
            document.getElementById('quizModal').style.display = 'flex';
        }

        function renderQuestion() {
            if (showResults || (currentIndex >= currentQuestions.length && currentIndex >= currentQuestions.length + currentTheory.length)) {
                showResultsScreen();
                return;
            }
            
            const isTheory = currentIndex >= currentQuestions.length;
            const qIndex = isTheory ? currentIndex - currentQuestions.length : currentIndex;
            
            if (isTheory) {
                const q = currentTheory[qIndex];
                const userAnswer = theoryAnswers[qIndex];
                const submitted = theorySubmitted[qIndex];
                
                let html = `
                    <div class="question-section">
                        <div class="question-type">📝 Theory / Essay Question ${qIndex + 1}</div>
                        <div class="question-text">${q.text}</div>
                        <div class="theory-answer">
                            <textarea id="theoryAnswer" class="theory-input" rows="5" placeholder="Type your answer here...">${userAnswer || ''}</textarea>
                        </div>
                        ${userAnswer ? `
                            <div class="feedback">
                                <strong>${submitted ? '✅ Answer saved to Firebase!' : '📌 Your answer has been recorded.'}</strong><br>
                                ${submitted ? 'Your teacher will review and grade this response.' : 'Click next to save your answer.'}
                            </div>
                        ` : ''}
                    </div>
                    <div class="nav-buttons">
                        <button class="btn-nav" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="btn-nav" onclick="nextQuestion()">${currentIndex === currentQuestions.length + currentTheory.length - 1 ? 'Finish' : 'Next →'}</button>
                    </div>
                `;
                
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modalProgress').innerHTML = `Theory Question ${qIndex + 1} of ${currentTheory.length}`;
                
                const textarea = document.getElementById('theoryAnswer');
                if (textarea) {
                    textarea.onblur = async function() {
                        theoryAnswers[qIndex] = this.value;
                        if (this.value.trim().length > 10) {
                            await saveTheoryAnswer(qIndex, this.value);
                            const feedback = document.querySelector('.feedback');
                            if (feedback) {
                                feedback.innerHTML = '<strong>✅ Answer saved to Firebase!</strong><br>Your teacher will review and grade this response.';
                            }
                        }
                    };
                }
            } else {
                const q = currentQuestions[qIndex];
                const selected = userAnswers[qIndex];
                
                let html = `
                    <div class="question-section">
                        <div class="question-type">✅ Objective Question ${qIndex + 1}</div>
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                `;
                
                q.options.forEach((opt, idx) => {
                    let optionClass = 'option';
                    if (selected !== null) {
                        if (idx === q.correct) optionClass += ' correct';
                        if (idx === selected && idx !== q.correct) optionClass += ' wrong';
                    }
                    html += `
                        <div class="${optionClass}" onclick="selectAnswer(${idx})">
                            <div class="option-letter">${String.fromCharCode(65 + idx)}</div>
                            <div class="option-text">${opt}</div>
                        </div>
                    `;
                });
                
                html += `</div>`;
                
                if (selected !== null) {
                    const isCorrect = selected === q.correct;
                    html += `
                        <div class="feedback">
                            <strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect!'}</strong><br>
                            ${q.explanation}
                        </div>
                    `;
                }
                
                html += `
                    </div>
                    <div class="nav-buttons">
                        <button class="btn-nav" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="btn-nav" onclick="nextQuestion()">${currentIndex === currentQuestions.length + currentTheory.length - 1 ? 'Finish' : 'Next →'}</button>
                    </div>
                `;
                
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modalProgress').innerHTML = `Objective Question ${qIndex + 1} of ${currentQuestions.length}`;
            }
        }

        function selectAnswer(optionIndex) {
            if (userAnswers[currentIndex] !== null) return;
            const isCorrect = optionIndex === currentQuestions[currentIndex].correct;
            userAnswers[currentIndex] = optionIndex;
            if (isCorrect) correctCount++;
            saveStats(isCorrect);
            renderQuestion();
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length && userAnswers[currentIndex] === null) {
                alert('Please select an answer before continuing!');
                return;
            }
            if (currentIndex === currentQuestions.length + currentTheory.length - 1) {
                showResults = true;
                renderQuestion();
            } else {
                currentIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function showResultsScreen() {
            const totalQuestions = currentQuestions.length;
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            let message = percentage >= 80 ? "🎉 Excellent! You're BECE ready!" : 
                         percentage >= 60 ? "👍 Good job! Keep practicing!" : 
                         percentage >= 40 ? "📚 Keep going! Review the explanations." : 
                         "💪 Don't give up! Practice makes perfect!";
            
            document.getElementById('modalBody').innerHTML = `
                <div class="results-card">
                    <h2>📊 Quiz Complete!</h2>
                    <div class="score-circle">
                        <div class="score-number">${percentage}%</div>
                    </div>
                    <p style="font-size: 1rem; font-weight: 700;">${correctCount}/${totalQuestions} Correct</p>
                    <p style="color: #667eea;">⭐ +${correctCount * 10} Points Earned!</p>
                    <p>${message}</p>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">📝 Your theory answers have been saved for teacher review.</p>
                    <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
                        <button class="btn-nav" onclick="closeModal(); startQuiz('${currentSubject}')">🔄 Practice Again</button>
                        <button class="btn-nav" onclick="closeModal()" style="background: #64748b;">📚 Change Subject</button>
                    </div>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('quizModal').style.display = 'none';
        }

        loadStats();
        renderSubjects();
    </script>
</body>
</html>
